passage: Matthew 6:9-13
title: The Lord's Prayer — the seven petitions
verses:
- ref: Matthew 6:9
  text: 'After this manner therefore pray ye: Our Father which art in heaven,

    Hallowed be thy name.

    '
  code: body._head
- ref: Matthew 6:10
  text: 'Thy kingdom come. Thy will be done in earth, as it is in heaven.

    '
- ref: Matthew 6:11
  text: 'Give us this day our daily bread.

    '
  code: body._head
- ref: Matthew 6:12
  text: 'And forgive us our debts, as we forgive our debtors.

    '
  code: kernel.T7
- ref: Matthew 6:13
  text: 'And lead us not into temptation, but deliver us from evil: For

    thine is the kingdom, and the power, and the glory, for ever.

    Amen.

    '
  code: body._head
- ref: Luke 11:2
  text: 'And he said unto them, When ye pray, say, Our Father which art in

    heaven, Hallowed be thy name. Thy kingdom come. Thy will be done,

    as in heaven, so in earth.

    '
  code: body._head
- ref: Luke 11:3
  text: Give us day by day our daily bread.
  code: body._head
- ref: Luke 11:4
  text: 'And forgive us our sins; for we also forgive every one that is

    indebted to us. And lead us not into temptation; but deliver us

    from evil.

    '
  code: kernel.T7
