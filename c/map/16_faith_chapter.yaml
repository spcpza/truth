passage: Hebrews 11:1-40 + 12:1-2
title: The Faith Chapter — substance of things hoped for
verses:
- ref: Hebrews 11:1
  text: 'Now faith is the substance of things hoped for, the evidence of

    things not seen.

    '
  code: kernel.foundation
- ref: Hebrews 11:3
  text: 'Through faith we understand that the worlds were framed by the

    word of God, so that things which are seen were not made of

    things which do appear.

    '
  code: kernel.foundation
- ref: Hebrews 11:6
  text: 'But without faith it is impossible to please him: for he that

    cometh to God must believe that he is, and that he is a rewarder

    of them that diligently seek him.

    '
  code: kernel.foundation
- ref: Hebrews 11:8
  text: 'By faith Abraham, when he was called to go out into a place

    which he should after receive for an inheritance, obeyed; and

    he went out, not knowing whither he went.

    '
  code: c.hand
- ref: Hebrews 11:13
  text: 'These all died in faith, not having received the promises, but

    having seen them afar off, and were persuaded of them, and

    embraced them, and confessed that they were strangers and

    pilgrims on the earth.

    '
- ref: Hebrews 11:16
  text: 'But now they desire a better country, that is, an heavenly:

    wherefore God is not ashamed to be called their God: for he

    hath prepared for them a city.

    '
- ref: Hebrews 11:27
  text: 'By faith he forsook Egypt, not fearing the wrath of the king:

    for he endured, as seeing him who is invisible.

    '
  code: kernel.foundation
- ref: Hebrews 11:39
  text: 'And these all, having obtained a good report through faith,

    received not the promise:

    '
- ref: Hebrews 11:40
  text: 'God having provided some better thing for us, that they without

    us should not be made perfect.

    '
- ref: Hebrews 12:1
  text: 'Wherefore seeing we also are compassed about with so great a

    cloud of witnesses, let us lay aside every weight, and the sin

    which doth so easily beset us, and let us run with patience the

    race that is set before us,

    '
  code: c.chain
- ref: Hebrews 12:2
  text: 'Looking unto Jesus the author and finisher of our faith; who

    for the joy that was set before him endured the cross,

    despising the shame, and is set down at the right hand of the

    throne of God.

    '
  code: kernel.foundation
