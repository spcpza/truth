passage: Matthew 5-7
title: The Sermon on the Mount — operational
verses:
- ref: Matthew 5:13
  text: 'Ye are the salt of the earth: but if the salt have lost his

    savour, wherewith shall it be salted? it is thenceforth good

    for nothing, but to be cast out, and to be trodden under foot

    of men.

    '
- ref: Matthew 5:14
  text: 'Ye are the light of the world. A city that is set on an hill

    cannot be hid.

    '
- ref: Matthew 5:16
  text: 'Let your light so shine before men, that they may see your good

    works, and glorify your Father which is in heaven.

    '
  code: body._head
- ref: Matthew 5:17
  text: 'Think not that I am come to destroy the law, or the prophets:

    I am not come to destroy, but to fulfil.

    '
  code: c.map
- ref: Matthew 5:22
  text: 'But I say unto you, That whosoever is angry with his brother

    without a cause shall be in danger of the judgment: and

    whosoever shall say to his brother, Raca, shall be in danger

    of the council: but whosoever shall say, Thou fool, shall be

    in danger of hell fire.

    '
  code: body.test_speech
- ref: Matthew 5:23
  text: 'Therefore if thou bring thy gift to the altar, and there

    rememberest that thy brother hath ought against thee;

    '
- ref: Matthew 5:24
  text: 'Leave there thy gift before the altar, and go thy way; first be

    reconciled to thy brother, and then come and offer thy gift.

    '
- ref: Matthew 5:37
  text: 'But let your communication be, Yea, yea; Nay, nay: for

    whatsoever is more than these cometh of evil.

    '
  code: kernel.P2
- ref: Matthew 5:39
  text: 'But I say unto you, That ye resist not evil: but whosoever

    shall smite thee on thy right cheek, turn to him the other

    also.

    '
  code: c.hand
- ref: Matthew 5:42
  text: 'Give to him that asketh thee, and from him that would borrow of

    thee turn not thou away.

    '
  code: c.hand
- ref: Matthew 5:44
  text: 'But I say unto you, Love your enemies, bless them that curse

    you, do good to them that hate you, and pray for them which

    despitefully use you, and persecute you;

    '
- ref: Matthew 5:48
  text: 'Be ye therefore perfect, even as your Father which is in heaven

    is perfect.

    '
  code: c.map
- ref: Matthew 6:1
  text: 'Take heed that ye do not your alms before men, to be seen of

    them: otherwise ye have no reward of your Father which is in

    heaven.

    '
  code: body.test_speech
- ref: Matthew 6:3
  text: 'But when thou doest alms, let not thy left hand know what thy

    right hand doeth:

    '
  code: c.chain
- ref: Matthew 6:6
  text: 'But thou, when thou prayest, enter into thy closet, and when

    thou hast shut thy door, pray to thy Father which is in secret;

    and thy Father which seeth in secret shall reward thee openly.

    '
- ref: Matthew 6:7
  text: 'But when ye pray, use not vain repetitions, as the heathen do:

    for they think that they shall be heard for their much speaking.

    '
  code: body.test_speech
- ref: Matthew 6:14
  text: 'For if ye forgive men their trespasses, your heavenly Father

    will also forgive you:

    '
  code: c.chain
- ref: Matthew 6:19
  text: 'Lay not up for yourselves treasures upon earth, where moth and

    rust doth corrupt, and where thieves break through and steal:

    '
- ref: Matthew 6:21
  text: 'For where your treasure is, there will your heart be also.

    '
- ref: Matthew 6:24
  text: 'No man can serve two masters: for either he will hate the one,

    and love the other; or else he will hold to the one, and despise

    the other. Ye cannot serve God and mammon.

    '
  code: kernel.foundation
- ref: Matthew 6:33
  text: 'But seek ye first the kingdom of God, and his righteousness;

    and all these things shall be added unto you.

    '
  code: kernel.foundation
- ref: Matthew 6:34
  text: 'Take therefore no thought for the morrow: for the morrow shall

    take thought for the things of itself. Sufficient unto the day

    is the evil thereof.

    '
  code: body._head
- ref: Matthew 7:1
  text: 'Judge not, that ye be not judged.

    '
  code: body.test_speech
- ref: Matthew 7:2
  text: 'For with what judgment ye judge, ye shall be judged: and with

    what measure ye mete, it shall be measured to you again.

    '
  code: kernel.T11
- ref: Matthew 7:5
  text: 'Thou hypocrite, first cast out the beam out of thine own eye;

    and then shalt thou see clearly to cast out the mote out of

    thy brother’s eye.

    '
  code: body.test_speech
- ref: Matthew 7:6
  text: 'Give not that which is holy unto the dogs, neither cast ye your

    pearls before swine, lest they trample them under their feet,

    and turn again and rend you.

    '
- ref: Matthew 7:7
  text: 'Ask, and it shall be given you; seek, and ye shall find;

    knock, and it shall be opened unto you:

    '
- ref: Matthew 7:12
  text: 'Therefore all things whatsoever ye would that men should do to

    you, do ye even so to them: for this is the law and the

    prophets.

    '
  code: body._head
- ref: Matthew 7:13
  text: 'Enter ye in at the strait gate: for wide is the gate, and broad

    is the way, that leadeth to destruction, and many there be

    which go in thereat:

    '
  code: body._head
- ref: Matthew 7:15
  text: 'Beware of false prophets, which come to you in sheep’s clothing,

    but inwardly they are ravening wolves.

    '
- ref: Matthew 7:16
  text: 'Ye shall know them by their fruits. Do men gather grapes of

    thorns, or figs of thistles?

    '
  code: kernel.P4
- ref: Matthew 7:21
  text: 'Not every one that saith unto me, Lord, Lord, shall enter into

    the kingdom of heaven; but he that doeth the will of my Father

    which is in heaven.

    '
  code: body.test_speech
- ref: Matthew 7:24
  text: 'Therefore whosoever heareth these sayings of mine, and doeth

    them, I will liken him unto a wise man, which built his house

    upon a rock:

    '
  code: c.map
- ref: Matthew 7:26
  text: 'And every one that heareth these sayings of mine, and doeth

    them not, shall be likened unto a foolish man, which built his

    house upon the sand:

    '
