book: Luke
passage: Luke 1-24
title: Luke — the gospel of compassion, scripture, and forgiveness
verses:
- ref: Luke 1:37
  text: 'For with God nothing shall be impossible.

    '
- ref: Luke 10:41
  text: 'And Jesus answered and said unto her, Martha, Martha, thou art careful and troubled about many things:

    '
- ref: Luke 12:48
  text: 'But he that knew not, and did commit things worthy of stripes, shall be beaten with few stripes. For unto whomsoever much is given, of him shall be much required: and to whom men have committed
    much, of him they will ask the more.

    '
- ref: Luke 15:20
  text: 'And he arose, and came to his father. But when he was yet a great way off, his father saw him, and had compassion, and ran, and fell on his neck, and kissed him.

    '
- ref: Luke 19:10
  text: 'For the Son of man is come to seek and to save that which was lost.

    '
- ref: Luke 22:42
  text: 'Saying, Father, if thou be willing, remove this cup from me: nevertheless not my will, but thine, be done.

    '
- ref: Luke 23:34
  text: 'Then said Jesus, Father, forgive them; for they know not what they do. And they parted his raiment, and cast lots.

    '
  code: c.chain
- ref: Luke 24:27
  text: 'And beginning at Moses and all the prophets, he expounded unto them in all the scriptures the things concerning himself.

    '
  code: c.core
