book: Ruth
passage: Ruth 1-4
title: Ruth — chesed, loyalty beyond obligation
verses:
- ref: Ruth 1:16
  text: 'And Ruth said, Intreat me not to leave thee, or to return from following after thee: for whither thou goest, I will go; and where thou lodgest, I will lodge: thy people shall be my people, and
    thy God my God:

    '
- ref: Ruth 2:12
  text: 'The LORD recompense thy work, and a full reward be given thee of the LORD God of Israel, under whose wings thou art come to trust.

    '
