book: Isaiah
passage: Isaiah 1-66
title: Isaiah — comfort, the suffering servant, the contrite
verses:
- ref: Isaiah 1:18
  text: 'Come now, and let us reason together, saith the LORD: though your sins be as scarlet, they shall be as white as snow; though they be red like crimson, they shall be as wool.

    '
- ref: Isaiah 6:3
  text: 'And one cried unto another, and said, Holy, holy, holy, is the LORD of hosts: the whole earth is full of his glory.

    '
  code: body._head
- ref: Isaiah 6:5
  text: 'Then said I, Woe is me! for I am undone; because I am a man of unclean lips, and I dwell in the midst of a people of unclean lips: for mine eyes have seen the King, the LORD of hosts.

    '
  code: body.test_speech
- ref: Isaiah 6:8
  text: 'Also I heard the voice of the Lord, saying, Whom shall I send, and who will go for us? Then said I, Here am I; send me.

    '
- ref: Isaiah 7:14
  text: 'Therefore the Lord himself shall give you a sign; Behold, a virgin shall conceive, and bear a son, and shall call his name Immanuel.

    '
- ref: Isaiah 9:6
  text: 'For unto us a child is born, unto us a son is given: and the government shall be upon his shoulder: and his name shall be called Wonderful, Counsellor, The mighty God, The everlasting Father, The
    Prince of Peace.

    '
- ref: Isaiah 26:3
  text: 'Thou wilt keep him in perfect peace, whose mind is stayed on thee: because he trusteth in thee.

    '
  code: body._head
- ref: Isaiah 30:15
  text: 'For thus saith the Lord GOD, the Holy One of Israel; In returning and rest shall ye be saved; in quietness and in confidence shall be your strength: and ye would not.

    '
- ref: Isaiah 30:21
  text: 'And thine ears shall hear a word behind thee, saying, This is the way, walk ye in it, when ye turn to the right hand, and when ye turn to the left.

    '
  code: c.hand
- ref: Isaiah 40:1
  text: 'Comfort ye, comfort ye my people, saith your God.

    '
- ref: Isaiah 40:8
  text: 'The grass withereth, the flower fadeth: but the word of our God shall stand for ever.

    '
  code: c.map.audit
- ref: Isaiah 40:28
  text: 'Hast thou not known? hast thou not heard, that the everlasting God, the LORD, the Creator of the ends of the earth, fainteth not, neither is weary? there is no searching of his understanding.

    '
- ref: Isaiah 40:31
  text: 'But they that wait upon the LORD shall renew their strength; they shall mount up with wings as eagles; they shall run, and not be weary; and they shall walk, and not faint.

    '
- ref: Isaiah 41:10
  text: 'Fear thou not; for I am with thee: be not dismayed; for I am thy God: I will strengthen thee; yea, I will help thee; yea, I will uphold thee with the right hand of my righteousness.

    '
  code: body._head
- ref: Isaiah 43:1
  text: 'But now thus saith the LORD that created thee, O Jacob, and he that formed thee, O Israel, Fear not: for I have redeemed thee, I have called thee by thy name; thou art mine.

    '
  code: body._head
- ref: Isaiah 43:18
  text: 'Remember ye not the former things, neither consider the things of old.

    '
  code: c.chain
- ref: Isaiah 43:25
  text: 'I, even I, am he that blotteth out thy transgressions for mine own sake, and will not remember thy sins.

    '
  code: c.chain
- ref: Isaiah 50:4
  text: 'The Lord GOD hath given me the tongue of the learned, that I should know how to speak a word in season to him that is weary: he wakeneth morning by morning, he wakeneth mine ear to hear as the
    learned.

    '
- ref: Isaiah 53:3
  text: 'He is despised and rejected of men; a man of sorrows, and acquainted with grief: and we hid as it were our faces from him; he was despised, and we esteemed him not.

    '
- ref: Isaiah 53:5
  text: 'But he was wounded for our transgressions, he was bruised for our iniquities: the chastisement of our peace was upon him; and with his stripes we are healed.

    '
- ref: Isaiah 53:7
  text: 'He was oppressed, and he was afflicted, yet he opened not his mouth: he is brought as a lamb to the slaughter, and as a sheep before her shearers is dumb, so he openeth not his mouth.

    '
- ref: Isaiah 55:1
  text: 'Ho, every one that thirsteth, come ye to the waters, and he that hath no money; come ye, buy, and eat; yea, come, buy wine and milk without money and without price.

    '
- ref: Isaiah 55:8
  text: 'For my thoughts are not your thoughts, neither are your ways my ways, saith the LORD.

    '
  code: kernel.P3
- ref: Isaiah 55:11
  text: 'So shall my word be that goeth forth out of my mouth: it shall not return unto me void, but it shall accomplish that which I please, and it shall prosper in the thing whereto I sent it.

    '
  code: c.core
- ref: Isaiah 57:15
  text: 'For thus saith the high and lofty One that inhabiteth eternity, whose name is Holy; I dwell in the high and holy place, with him also that is of a contrite and humble spirit, to revive the spirit
    of the humble, and to revive the heart of the contrite ones.

    '
- ref: Isaiah 61:1
  text: 'The Spirit of the Lord GOD is upon me; because the LORD hath anointed me to preach good tidings unto the meek; he hath sent me to bind up the brokenhearted, to proclaim liberty to the captives,
    and the opening of the prison to them that are bound;

    '
- ref: Isaiah 64:6
  text: 'But we are all as an unclean thing, and all our righteousnesses are as filthy rags; and we all do fade as a leaf; and our iniquities, like the wind, have taken us away.

    '
  code: c.hand
- ref: Isaiah 66:2
  text: 'For all those things hath mine hand made, and all those things have been, saith the LORD: but to this man will I look, even to him that is poor and of a contrite spirit, and trembleth at my word.

    '
