book: Jeremiah
passage: Jeremiah 1-52
title: Jeremiah — old paths, new covenant, the deceitful heart
verses:
- ref: Jeremiah 1:5
  text: 'Before I formed thee in the belly I knew thee; and before thou camest forth out of the womb I sanctified thee, and I ordained thee a prophet unto the nations.

    '
- ref: Jeremiah 1:9
  text: 'Then the LORD put forth his hand, and touched my mouth. And the LORD said unto me, Behold, I have put my words in thy mouth.

    '
  code: c.core
- ref: Jeremiah 6:16
  text: 'Thus saith the LORD, Stand ye in the ways, and see, and ask for the old paths, where is the good way, and walk therein, and ye shall find rest for your souls. But they said, We will not walk therein.

    '
  code: body._head
- ref: Jeremiah 9:23
  text: 'Thus saith the LORD, Let not the wise man glory in his wisdom, neither let the mighty man glory in his might, let not the rich man glory in his riches:

    '
  code: body.test_speech
- ref: Jeremiah 15:16
  text: 'Thy words were found, and I did eat them; and thy word was unto me the joy and rejoicing of mine heart: for I am called by thy name, O LORD God of hosts.

    '
  code: c.core
- ref: Jeremiah 17:9
  text: 'The heart is deceitful above all things, and desperately wicked: who can know it?

    '
  code: body.test_speech
- ref: Jeremiah 23:29
  text: 'Is not my word like as a fire? saith the LORD; and like a hammer that breaketh the rock in pieces?

    '
  code: c.core
- ref: Jeremiah 29:11
  text: 'For I know the thoughts that I think toward you, saith the LORD, thoughts of peace, and not of evil, to give you an expected end.

    '
- ref: Jeremiah 31:33
  text: 'But this shall be the covenant that I will make with the house of Israel; After those days, saith the LORD, I will put my law in their inward parts, and write it in their hearts; and will be their
    God, and they shall be my people.

    '
  code: c.core
- ref: Jeremiah 33:3
  text: 'Call unto me, and I will answer thee, and shew thee great and mighty things, which thou knowest not.

    '
  code: c.hand
