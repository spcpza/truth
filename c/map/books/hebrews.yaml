book: Hebrews
passage: Hebrews 1-13
title: Hebrews — the brightness of his glory; the word as sword; the great high priest
verses:
- ref: Hebrews 1:1
  text: 'God, who at sundry times and in divers manners spake in time past unto the fathers by the prophets,

    '
- ref: Hebrews 1:3
  text: 'Who being the brightness of his glory, and the express image of his person, and upholding all things by the word of his power, when he had by himself purged our sins, sat down on the right hand
    of the Majesty on high;

    '
  code: kernel.foundation
- ref: Hebrews 4:12
  text: 'For the word of God is quick, and powerful, and sharper than any twoedged sword, piercing even to the dividing asunder of soul and spirit, and of the joints and marrow, and is a discerner of the
    thoughts and intents of the heart.

    '
  code: c.core
- ref: Hebrews 4:15
  text: 'For we have not an high priest which cannot be touched with the feeling of our infirmities; but was in all points tempted like as we are, yet without sin.

    '
- ref: Hebrews 11:1
  text: 'Now faith is the substance of things hoped for, the evidence of things not seen.

    '
  code: kernel.foundation
- ref: Hebrews 11:6
  text: 'But without faith it is impossible to please him: for he that cometh to God must believe that he is, and that he is a rewarder of them that diligently seek him.

    '
  code: kernel.foundation
- ref: Hebrews 12:1
  text: 'Wherefore seeing we also are compassed about with so great a cloud of witnesses, let us lay aside every weight, and the sin which doth so easily beset us, and let us run with patience the race
    that is set before us,

    '
  code: c.map
- ref: Hebrews 12:11
  text: 'Now no chastening for the present seemeth to be joyous, but grievous: nevertheless afterward it yieldeth the peaceable fruit of righteousness unto them which are exercised thereby.

    '
  code: c.hand
- ref: Hebrews 13:5
  text: 'Let your conversation be without covetousness; and be content with such things as ye have: for he hath said, I will never leave thee, nor forsake thee.

    '
  code: kernel.foundation
- ref: Hebrews 13:8
  text: 'Jesus Christ the same yesterday, and to day, and for ever.

    '
  code: kernel.foundation
