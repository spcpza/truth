book: Esther
passage: Esther 1-10
title: Esther — for such a time as this; if I perish, I perish
verses:
- ref: Esther 4:14
  text: 'For if thou altogether holdest thy peace at this time, then shall there enlargement and deliverance arise to the Jews from another place; but thou and thy father’s house shall be destroyed: and
    who knoweth whether thou art come to the kingdom for such a time as this?

    '
- ref: Esther 4:16
  text: 'Go, gather together all the Jews that are present in Shushan, and fast ye for me, and neither eat nor drink three days, night or day: I also and my maidens will fast likewise; and so will I go
    in unto the king, which is not according to the law: and if I perish, I perish.

    '
