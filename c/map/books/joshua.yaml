book: Joshua
passage: Joshua 1-24
title: Joshua — meditate day and night; choose this day
verses:
- ref: Joshua 1:8
  text: 'This book of the law shall not depart out of thy mouth; but thou shalt meditate therein day and night, that thou mayest observe to do according to all that is written therein: for then thou shalt
    make thy way prosperous, and then thou shalt have good success.

    '
  code: body._head
- ref: Joshua 1:9
  text: 'Have not I commanded thee? Be strong and of a good courage; be not afraid, neither be thou dismayed: for the LORD thy God is with thee whithersoever thou goest.

    '
  code: body._head
- ref: Joshua 24:15
  text: 'And if it seem evil unto you to serve the LORD, choose you this day whom ye will serve; whether the gods which your fathers served that were on the other side of the flood, or the gods of the Amorites,
    in whose land ye dwell: but as for me and my house, we will serve the LORD.

    '
  code: kernel.foundation
