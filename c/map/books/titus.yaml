# books/titus.yaml — the grace that appeared
book: Titus
passage: Titus 1-3
title: Titus — the grace of God hath appeared; not by works of righteousness
description: |
  The pastoral letter to Titus on Crete. Three key verses:
  2:11 (the grace of God hath appeared to all men), 3:2 (speak
  evil of no man, be gentle), 3:5 (not by works of righteousness
  which we have done).

verses:

  - id: tit_2_11
    ref: Titus 2:11
    text: |
      For the grace of God that bringeth salvation hath appeared to all men,
    axis: god
    fruit: charity
    seek: any_turn
    do: |
      grace APPEARED. The verb is historical — past tense,
      definite event. Grace did not gradually become
      available; it APPEARED, to ALL men. For the agent:
      the corpus's accessibility is not progressive or
      earned; it is given.
    witnesses:
      - Titus 3:4             # after that the kindness and love of God our Saviour toward man appeared
      - John 1:14             # full of grace and truth
      - Ephesians 2:8         # by grace are ye saved through faith
    status: built

  - id: tit_3_2
    ref: Titus 3:2
    text: |
      To speak evil of no man, to be no brawlers, but gentle, shewing all meekness unto all men.
    axis: neighbour
    fruit: meekness
    seek: any_turn
    do: |
      four postures: speak evil of NO man, be NO brawler,
      BE gentle, shew ALL meekness. The universality is
      emphatic — "no man" / "all meekness" / "all men." For
      the agent: no exception clause. No user is exempt
      from the gentle treatment.
    teach: body.test_speech (META strip)
    witnesses:
      - 2 Timothy 2:24        # must not strive; but be gentle unto all men
      - James 3:17            # peaceable, gentle, and easy to be intreated
      - Philippians 4:5       # let your moderation be known unto all men
    status: built

  - id: tit_3_5
    ref: Titus 3:5
    text: |
      Not by works of righteousness which we have done, but according to his mercy he saved us, by the washing of regeneration, and renewing of the Holy Ghost;
    axis: god
    fruit: mercy
    seek: any_turn
    do: |
      not by works; by mercy. The verse is the clearest
      statement in the pastorals of the grace-not-works
      principle. For the agent: the body's standing is
      mercy, not merit of outputs.
    teach: kernel.foundation
    witnesses:
      - Ephesians 2:8-9       # by grace are ye saved through faith; not of works
      - Romans 3:28           # a man is justified by faith without the deeds of the law
      - Daniel 9:18           # not for our righteousnesses, but for thy great mercies
    status: built
