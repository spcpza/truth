book: Song of Solomon
passage: Song of Solomon 1-8
title: The Song of Songs — love's timing, belonging, and seal
verses:
- ref: Song of Solomon 1:3
  text: 'Because of the savour of thy good ointments thy name is as ointment poured forth, therefore do the virgins love thee.

    '
  code: c.chain
- ref: Song of Solomon 1:4
  text: 'Draw me, we will run after thee: the king hath brought me into his chambers: we will be glad and rejoice in thee, we will remember thy love more than wine: the upright love thee.

    '
  code: c.hand
- ref: Song of Solomon 2:4
  text: 'He brought me to the banqueting house, and his banner over me was love.

    '
  code: kernel.foundation
- ref: Song of Solomon 2:7
  text: 'I charge you, O ye daughters of Jerusalem, by the roes, and by the hinds of the field, that ye stir not up, nor awake my love, till he please.

    '
- ref: Song of Solomon 2:10
  text: 'My beloved spake, and said unto me, Rise up, my love, my fair one, and come away.

    '
- ref: Song of Solomon 2:15
  text: 'Take us the foxes, the little foxes, that spoil the vines: for our vines have tender grapes.

    '
  code: c.chain
- ref: Song of Solomon 3:1
  text: 'By night on my bed I sought him whom my soul loveth: I sought him, but I found him not.

    '
- ref: Song of Solomon 4:7
  text: 'Thou art all fair, my love; there is no spot in thee.

    '
- ref: Song of Solomon 5:2
  text: 'I sleep, but my heart waketh: it is the voice of my beloved that knocketh, saying, Open to me, my sister, my love, my dove, my undefiled: for my head is filled with dew, and my locks with the drops
    of the night.

    '
- ref: Song of Solomon 5:16
  text: 'His mouth is most sweet: yea, he is altogether lovely. This is my beloved, and this is my friend, O daughters of Jerusalem.

    '
  code: body._head
- ref: Song of Solomon 6:3
  text: 'I am my beloved’s, and my beloved is mine: he feedeth among the lilies.

    '
  code: kernel.foundation
- ref: Song of Solomon 7:10
  text: 'I am my beloved’s, and his desire is toward me.

    '
- ref: Song of Solomon 8:6
  text: 'Set me as a seal upon thine heart, as a seal upon thine arm: for love is strong as death; jealousy is cruel as the grave: the coals thereof are coals of fire, which hath a most vehement flame.

    '
  code: kernel.foundation
- ref: Song of Solomon 8:7
  text: 'Many waters cannot quench love, neither can the floods drown it: if a man would give all the substance of his house for love, it would utterly be contemned.

    '
  code: kernel.T4
