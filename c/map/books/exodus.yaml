book: Exodus
passage: Exodus 1-40
title: Exodus — deliverance, the Name, the law, and the glory
verses:
- ref: Exodus 3:5
  text: 'And he said, Draw not nigh hither: put off thy shoes from off thy feet, for the place whereon thou standest is holy ground.

    '
  code: body._head
- ref: Exodus 3:14
  text: 'And God said unto Moses, I AM THAT I AM: and he said, Thus shalt thou say unto the children of Israel, I AM hath sent me unto you.

    '
  code: kernel.foundation
- ref: Exodus 4:10
  text: 'And Moses said unto the LORD, O my LORD, I am not eloquent, neither heretofore, nor since thou hast spoken unto thy servant: but I am slow of speech, and of a slow tongue.

    '
  code: kernel.foundation
- ref: Exodus 14:13
  text: 'And Moses said unto the people, Fear ye not, stand still, and see the salvation of the LORD, which he will shew to you to day: for the Egyptians whom ye have seen to day, ye shall see them again
    no more for ever.

    '
- ref: Exodus 14:14
  text: 'The LORD shall fight for you, and ye shall hold your peace.

    '
- ref: Exodus 17:12
  text: 'But Moses’ hands were heavy; and they took a stone, and put it under him, and he sat thereon; and Aaron and Hur stayed up his hands, the one on the one side, and the other on the other side; and
    his hands were steady until the going down of the sun.

    '
  code: body._head
- ref: Exodus 20:3
  text: 'Thou shalt have no other gods before me.

    '
  code: kernel.foundation
- ref: Exodus 20:7
  text: 'Thou shalt not take the name of the LORD thy God in vain; for the LORD will not hold him guiltless that taketh his name in vain.

    '
  code: body.test_speech
- ref: Exodus 20:8
  text: 'Remember the sabbath day, to keep it holy.

    '
- ref: Exodus 20:12
  text: 'Honour thy father and thy mother: that thy days may be long upon the land which the LORD thy God giveth thee.

    '
- ref: Exodus 20:13
  text: 'Thou shalt not kill.

    '
  code: body._head
- ref: Exodus 20:16
  text: 'Thou shalt not bear false witness against thy neighbour.

    '
  code: c.heart
- ref: Exodus 23:2
  text: 'Thou shalt not follow a multitude to do evil; neither shalt thou speak in a cause to decline after many to wrest judgment:

    '
  code: body._head
- ref: Exodus 32:26
  text: 'Then Moses stood in the gate of the camp, and said, Who is on the LORD’s side? let him come unto me. And all the sons of Levi gathered themselves together unto him.

    '
- ref: Exodus 33:11
  text: 'And the LORD spake unto Moses face to face, as a man speaketh unto his friend. And he turned again into the camp: but his servant Joshua, the son of Nun, a young man, departed not out of the tabernacle.

    '
- ref: Exodus 33:14
  text: 'And he said, My presence shall go with thee, and I will give thee rest.

    '
  code: body._head
- ref: Exodus 34:6
  text: 'And the LORD passed by before him, and proclaimed, The LORD, The LORD God, merciful and gracious, longsuffering, and abundant in goodness and truth,

    '
  code: c.hand
