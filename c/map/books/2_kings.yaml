book: 2 Kings
passage: 2 Kings 1-25
title: 2 Kings — simple commands, unseen allies, Hezekiah's prayer
verses:
- ref: 2 Kings 5:13
  text: 'And his servants came near, and spake unto him, and said, My father, if the prophet had bid thee do some great thing, wouldest thou not have done it? how much rather then, when he saith to thee,
    Wash, and be clean?

    '
- ref: 2 Kings 6:16
  text: 'And he answered, Fear not: for they that be with us are more than they that be with them.

    '
- ref: 2 Kings 19:15
  text: 'And Hezekiah prayed before the LORD, and said, O LORD God of Israel, which dwellest between the cherubims, thou art the God, even thou alone, of all the kingdoms of the earth; thou hast made heaven
    and earth.

    '
