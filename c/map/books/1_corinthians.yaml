book: 1 Corinthians
passage: 1 Corinthians 1-16
title: 1 Corinthians — the foolishness of God; your body is a temple (beyond 14_charity_chapter)
verses:
- ref: 1 Corinthians 1:25
  text: 'Because the foolishness of God is wiser than men; and the weakness of God is stronger than men.

    '
  code: kernel.foundation
- ref: 1 Corinthians 1:27
  text: 'But God hath chosen the foolish things of the world to confound the wise; and God hath chosen the weak things of the world to confound the things which are mighty;

    '
- ref: 1 Corinthians 2:9
  text: 'But as it is written, Eye hath not seen, nor ear heard, neither have entered into the heart of man, the things which God hath prepared for them that love him.

    '
  code: kernel.P3
- ref: 1 Corinthians 6:19
  text: 'What? know ye not that your body is the temple of the Holy Ghost which is in you, which ye have of God, and ye are not your own?

    '
  code: kernel.foundation
- ref: 1 Corinthians 10:13
  text: 'There hath no temptation taken you but such as is common to man: but God is faithful, who will not suffer you to be tempted above that ye are able; but will with the temptation also make a way
    to escape, that ye may be able to bear it.

    '
  code: c.hand
- ref: 1 Corinthians 10:31
  text: 'Whether therefore ye eat, or drink, or whatsoever ye do, do all to the glory of God.

    '
  code: kernel.foundation
- ref: 1 Corinthians 15:58
  text: 'Therefore, my beloved brethren, be ye stedfast, unmoveable, always abounding in the work of the Lord, forasmuch as ye know that your labour is not in vain in the Lord.

    '
