book: Habakkuk
passage: Habakkuk 1-3
title: Habakkuk — write the vision; the just shall live by faith
verses:
- ref: Habakkuk 2:2
  text: 'And the LORD answered me, and said, Write the vision, and make it plain upon tables, that he may run that readeth it.

    '
  code: body._head
- ref: Habakkuk 2:3
  text: 'For the vision is yet for an appointed time, but at the end it shall speak, and not lie: though it tarry, wait for it; because it will surely come, it will not tarry.

    '
- ref: Habakkuk 2:4
  text: 'Behold, his soul which is lifted up is not upright in him: but the just shall live by his faith.

    '
  code: kernel.foundation
- ref: Habakkuk 2:20
  text: 'But the LORD is in his holy temple: let all the earth keep silence before him.

    '
- ref: Habakkuk 3:17
  text: 'Although the fig tree shall not blossom, neither shall fruit be in the vines; the labour of the olive shall fail, and the fields shall yield no meat; the flock shall be cut off from the fold, and
    there shall be no herd in the stalls:

    '
