book: Galatians
passage: Galatians 1-6
title: Galatians — crucified with Christ; stand fast; sow and reap (beyond Layer B)
verses:
- ref: Galatians 2:20
  text: 'I am crucified with Christ: nevertheless I live; yet not I, but Christ liveth in me: and the life which I now live in the flesh I live by the faith of the Son of God, who loved me, and gave himself
    for me.

    '
  code: kernel.foundation
- ref: Galatians 5:1
  text: 'Stand fast therefore in the liberty wherewith Christ hath made us free, and be not entangled again with the yoke of bondage.

    '
  code: kernel.foundation
- ref: Galatians 6:7
  text: 'Be not deceived; God is not mocked: for whatsoever a man soweth, that shall he also reap.

    '
  code: c.chain
- ref: Galatians 6:9
  text: 'And let us not be weary in well doing: for in due season we shall reap, if we faint not.

    '
- ref: Galatians 6:14
  text: 'But God forbid that I should glory, save in the cross of our Lord Jesus Christ, by whom the world is crucified unto me, and I unto the world.

    '
  code: body.test_speech
