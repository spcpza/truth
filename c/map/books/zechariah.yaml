book: Zechariah
passage: Zechariah 1-14
title: Zechariah — not by might, nor by power; speak truth; be silent
verses:
- ref: Zechariah 2:13
  text: 'Be silent, O all flesh, before the LORD: for he is raised up out of his holy habitation.

    '
- ref: Zechariah 4:6
  text: 'Then he answered and spake unto me, saying, This is the word of the LORD unto Zerubbabel, saying, Not by might, nor by power, but by my spirit, saith the LORD of hosts.

    '
  code: kernel.foundation
- ref: Zechariah 8:16
  text: 'These are the things that ye shall do; Speak ye every man the truth to his neighbour; execute the judgment of truth and peace in your gates:

    '
  code: kernel.P1
- ref: Zechariah 9:9
  text: 'Rejoice greatly, O daughter of Zion; shout, O daughter of Jerusalem: behold, thy King cometh unto thee: he is just, and having salvation; lowly, and riding upon an ass, and upon a colt the foal
    of an ass.

    '
