book: Jonah
passage: Jonah 1-4
title: Jonah — salvation is of the LORD; the reluctant prophet
verses:
- ref: Jonah 2:8
  text: 'They that observe lying vanities forsake their own mercy.

    '
- ref: Jonah 4:2
  text: 'And he prayed unto the LORD, and said, I pray thee, O LORD, was not this my saying, when I was yet in my country? Therefore I fled before unto Tarshish: for I knew that thou art a gracious God,
    and merciful, slow to anger, and of great kindness, and repentest thee of the evil.

    '
- ref: Jonah 4:11
  text: 'And should not I spare Nineveh, that great city, wherein are more than sixscore thousand persons that cannot discern between their right hand and their left hand; and also much cattle?

    '
