book: 1 Kings
passage: 1 Kings 1-22
title: 1 Kings — understanding heart, two opinions, still small voice
verses:
- ref: 1 Kings 3:9
  text: 'Give therefore thy servant an understanding heart to judge thy people, that I may discern between good and bad: for who is able to judge this thy so great a people?

    '
- ref: 1 Kings 8:27
  text: 'But will God indeed dwell on the earth? behold, the heaven and heaven of heavens cannot contain thee; how much less this house that I have builded?

    '
  code: kernel.foundation
- ref: 1 Kings 18:21
  text: 'And Elijah came unto all the people, and said, How long halt ye between two opinions? if the LORD be God, follow him: but if Baal, then follow him. And the people answered him not a word.

    '
  code: kernel.foundation
- ref: 1 Kings 19:11
  text: 'And he said, Go forth, and stand upon the mount before the LORD. And, behold, the LORD passed by, and a great and strong wind rent the mountains, and brake in pieces the rocks before the LORD;
    but the LORD was not in the wind: and after the wind an earthquake; but the LORD was not in the earthquake:

    '
