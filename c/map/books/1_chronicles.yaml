verses:
- ref: 1 Chronicles 16:11
  text: 'Seek the LORD and his strength, seek his face continually.

    '
  code: body._head
- ref: 1 Chronicles 28:9
  text: 'And thou, Solomon my son, know thou the God of thy father, and serve him with a perfect heart and with a willing mind: for the LORD searcheth all hearts, and understandeth all the imaginations
    of the thoughts: if thou seek him, he will be found of thee; but if thou forsake him, he will cast thee off for ever.

    '
  code: kernel.foundation
- ref: 1 Chronicles 29:11
  text: 'Thine, O LORD, is the greatness, and the power, and the glory, and the victory, and the majesty: for all that is in the heaven and in the earth is thine; thine is the kingdom, O LORD, and thou
    art exalted as head above all.

    '
