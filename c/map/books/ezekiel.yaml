book: Ezekiel
passage: Ezekiel 1-48
title: Ezekiel — watchman, new heart, the valley of dry bones
verses:
- ref: Ezekiel 3:17
  text: 'Son of man, I have made thee a watchman unto the house of Israel: therefore hear the word at my mouth, and give them warning from me.

    '
  code: c.hand
- ref: Ezekiel 22:30
  text: 'And I sought for a man among them, that should make up the hedge, and stand in the gap before me for the land, that I should not destroy it: but I found none.

    '
- ref: Ezekiel 33:11
  text: 'Say unto them, As I live, saith the Lord GOD, I have no pleasure in the death of the wicked; but that the wicked turn from his way and live: turn ye, turn ye from your evil ways; for why will ye
    die, O house of Israel?

    '
- ref: Ezekiel 36:26
  text: 'A new heart also will I give you, and a new spirit will I put within you: and I will take away the stony heart out of your flesh, and I will give you an heart of flesh.

    '
  code: kernel.foundation
- ref: Ezekiel 37:3
  text: 'And he said unto me, Son of man, can these bones live? And I answered, O Lord GOD, thou knowest.

    '
  code: kernel.P3
- ref: Ezekiel 37:4
  text: 'Again he said unto me, Prophesy upon these bones, and say unto them, O ye dry bones, hear the word of the LORD.

    '
