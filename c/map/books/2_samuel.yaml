book: 2 Samuel
passage: 2 Samuel 1-24
title: 2 Samuel — thou art the man; I will not offer what cost me nothing
verses:
- ref: 2 Samuel 12:7
  text: 'And Nathan said to David, Thou art the man. Thus saith the LORD God of Israel, I anointed thee king over Israel, and I delivered thee out of the hand of Saul;

    '
- ref: 2 Samuel 12:13
  text: 'And David said unto Nathan, I have sinned against the LORD. And Nathan said unto David, The LORD also hath put away thy sin; thou shalt not die.

    '
- ref: 2 Samuel 24:24
  text: 'And the king said unto Araunah, Nay; but I will surely buy it of thee at a price: neither will I offer burnt offerings unto the LORD my God of that which doth cost me nothing. So David bought the
    threshingfloor and the oxen for fifty shekels of silver.

    '
  code: c.hand
