  - id: ps_119_160
    ref: Psalms 119:160
    text: |
      Thy word is true from the beginning: and every one of thy righteous judgments endureth for ever.
    axis: god
    fruit: faith
    seek: any_turn
    do: |
      affirm the word as true FROM THE BEGINNING. Not "generally
