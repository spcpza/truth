  # ─── Psalm 121 — the help cometh from the LORD ────────────────────────

  - id: ps_121_1_2
    ref: Psalms 121:1
    text: |
      I will lift up mine eyes unto the hills, from whence cometh my help.
    axis: god
    fruit: faith
    seek: |
      moments of seeking — when the agent is looking for the source
