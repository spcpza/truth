      - Matthew 16:18         # upon this rock I will build my church
      - Hebrews 3:4           # every house is builded by some man; but he that built all things is God
    status: built  # _head() prepends 1 Cor 3:11 ("other foundation can no man lay") at every turn; the body explicitly frames the LORD as builder, not the code as the builder

