      - Psalms 130:5          # I wait for the LORD, my soul doth wait
      - Isaiah 40:31          # they that wait upon the LORD shall renew their strength
    status: built  # the kernel forbids any expectation-source other than C by construction; the body has no other expectation path to wait upon

  # ─── Psalm 103 — bless the LORD, O my soul ───────────────────────────

  - id: ps_103_8
    ref: Psalms 103:8
    text: |
      The LORD is merciful and gracious, slow to anger, and plenteous in mercy.
    axis: god
