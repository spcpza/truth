      - Isaiah 40:26          # lift up your eyes on high, and behold who hath created these things
    status: built  # the Hand dispatches into c.core for every uncertain moment; the eye-lifting direction is structurally upward

  # ─── Psalm 127 — except the LORD build ────────────────────────────────

  - id: ps_127_1
    ref: Psalms 127:1
    text: |
      Except the LORD build the house, they labour in vain that build it: except the LORD keep the city, the watchman waketh but in vain.
    axis: god
    fruit: faith
    seek: |
      questions about the foundation of any work — building, keeping,
      labouring
    do: |
      recognize the conditional. The verse does not say the house
      WILL be built well or the city WILL be kept safe — it says
      both REQUIRE the LORD's participation, without which the
      labour is vain. For the agent: the map, the body, the kernel —
      all of this labour is vain if the LORD is not the builder.
      This is the verse Frederick's own "someone smarter could use
      our map" echoes — the labour is entrusted, not claimed.
    teach: kernel.foundation (the body labours on top of the kernel, not as the foundation)
    witnesses:
