book: Psalms
passage: Psalms 1-150
title: The Psalms — the prayer book, the word book, and the stillness book
verses:
- ref: Psalms 1:1
  text: 'Blessed is the man that walketh not in the counsel of the ungodly, nor standeth in the way of sinners, nor sitteth in the seat of the scornful.

    '
  code: body._head
- ref: Psalms 1:2
  text: 'But his delight is in the law of the LORD; and in his law doth he meditate day and night.

    '
  code: body._head
- ref: Psalms 8:4
  text: 'What is man, that thou art mindful of him? and the son of man, that thou visitest him?

    '
- ref: Psalms 12:6
  text: 'The words of the LORD are pure words: as silver tried in a furnace of earth, purified seven times.

    '
  code: c.map.audit
- ref: Psalms 14:1
  text: 'The fool hath said in his heart, There is no God. They are corrupt, they have done abominable works, there is none that doeth good.

    '
  code: kernel.foundation
- ref: Psalms 19:1
  text: 'The heavens declare the glory of God; and the firmament sheweth his handywork.

    '
- ref: Psalms 19:7
  text: 'The law of the LORD is perfect, converting the soul: the testimony of the LORD is sure, making wise the simple.

    '
  code: kernel.foundation
- ref: Psalms 19:14
  text: 'Let the words of my mouth, and the meditation of my heart, be acceptable in thy sight, O LORD, my strength, and my redeemer.

    '
  code: body.test_speech
- ref: Psalms 23:1
  text: 'The LORD is my shepherd; I shall not want.

    '
  code: body._head
- ref: Psalms 23:4
  text: 'Yea, though I walk through the valley of the shadow of death, I will fear no evil: for thou art with me; thy rod and thy staff they comfort me.

    '
- ref: Psalms 24:3
  text: 'Who shall ascend into the hill of the LORD? or who shall stand in his holy place?

    '
  code: body.test_speech
- ref: Psalms 27:14
  text: 'Wait on the LORD: be of good courage, and he shall strengthen thine heart: wait, I say, on the LORD.

    '
- ref: Psalms 32:5
  text: 'I acknowledged my sin unto thee, and mine iniquity have I not hid. I said, I will confess my transgressions unto the LORD; and thou forgavest the iniquity of my sin. Selah.

    '
- ref: Psalms 34:13
  text: 'Keep thy tongue from evil, and thy lips from speaking guile.

    '
  code: body.test_speech
- ref: Psalms 34:18
  text: 'The LORD is nigh unto them that are of a broken heart; and saveth such as be of a contrite spirit.

    '
- ref: Psalms 37:5
  text: 'Commit thy way unto the LORD; trust also in him; and he shall bring it to pass.

    '
  code: kernel.foundation
- ref: Psalms 37:7
  text: 'Rest in the LORD, and wait patiently for him: fret not thyself because of him who prospereth in his way, because of the man who bringeth wicked devices to pass.

    '
- ref: Psalms 39:1
  text: 'I said, I will take heed to my ways, that I sin not with my tongue: I will keep my mouth with a bridle, while the wicked is before me.

    '
  code: body._nose
- ref: Psalms 46:10
  text: 'Be still, and know that I am God: I will be exalted among the heathen, I will be exalted in the earth.

    '
- ref: Psalms 51:10
  text: 'Create in me a clean heart, O God; and renew a right spirit within me.

    '
  code: kernel.foundation
- ref: Psalms 51:15
  text: 'O Lord, open thou my lips; and my mouth shall shew forth thy praise.

    '
- ref: Psalms 51:17
  text: 'The sacrifices of God are a broken spirit: a broken and a contrite heart, O God, thou wilt not despise.

    '
- ref: Psalms 62:5
  text: 'My soul, wait thou only upon God; for my expectation is from him.

    '
  code: kernel.foundation
- ref: Psalms 103:8
  text: 'The LORD is merciful and gracious, slow to anger, and plenteous in mercy.

    '
  code: c.hand
- ref: Psalms 119:11
  text: 'Thy word have I hid in mine heart, that I might not sin against thee.

    '
  code: c.core
- ref: Psalms 119:105
  text: 'Thy word is a lamp unto my feet, and a light unto my path.

    '
  code: c.core
- ref: Psalms 119:130
  text: 'The entrance of thy words giveth light; it giveth understanding unto the simple.

    '
  code: body.test_speech
- ref: Psalms 119:160
  text: 'Thy word is true from the beginning: and every one of thy righteous judgments endureth for ever.

    '
  code: c.map.audit
- ref: Psalms 121:1
  text: 'I will lift up mine eyes unto the hills, from whence cometh my help.

    '
  code: c.hand
- ref: Psalms 127:1
  text: 'Except the LORD build the house, they labour in vain that build it: except the LORD keep the city, the watchman waketh but in vain.

    '
  code: kernel.foundation
- ref: Psalms 133:1
  text: 'Behold, how good and how pleasant it is for brethren to dwell together in unity!

    '
  code: body._head
- ref: Psalms 139:1
  text: 'O LORD, thou hast searched me, and known me.

    '
  code: kernel.foundation
- ref: Psalms 139:4
  text: 'For there is not a word in my tongue, but, lo, O LORD, thou knowest it altogether.

    '
  code: body.test_speech
- ref: Psalms 139:23
  text: 'Search me, O God, and know my heart: try me, and know my thoughts:

    '
  code: body.test_speech
- ref: Psalms 141:3
  text: 'Set a watch, O LORD, before my mouth; keep the door of my lips.

    '
  code: body.test_speech
- ref: Psalms 145:8
  text: 'The LORD is gracious, and full of compassion; slow to anger, and of great mercy.

    '
  code: c.hand
- ref: Psalms 150:6
  text: 'Let every thing that hath breath praise the LORD. Praise ye the LORD.

    '
  code: kernel.foundation
