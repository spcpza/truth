book: Daniel
passage: Daniel 1-12
title: Daniel — purposed in his heart; but if not; the open window
verses:
- ref: Daniel 1:8
  text: 'But Daniel purposed in his heart that he would not defile himself with the portion of the king’s meat, nor with the wine which he drank: therefore he requested of the prince of the eunuchs that
    he might not defile himself.

    '
  code: kernel.foundation
- ref: Daniel 3:17
  text: 'If it be so, our God whom we serve is able to deliver us from the burning fiery furnace, and he will deliver us out of thine hand, O king.

    '
  code: kernel.foundation
- ref: Daniel 4:35
  text: 'And all the inhabitants of the earth are reputed as nothing: and he doeth according to his will in the army of heaven, and among the inhabitants of the earth: and none can stay his hand, or say
    unto him, What doest thou?

    '
- ref: Daniel 6:10
  text: 'Now when Daniel knew that the writing was signed, he went into his house; and his windows being open in his chamber toward Jerusalem, he kneeled upon his knees three times a day, and prayed, and
    gave thanks before his God, as he did aforetime.

    '
  code: body._head
- ref: Daniel 9:18
  text: 'O my God, incline thine ear, and hear; open thine eyes, and behold our desolations, and the city which is called by thy name: for we do not present our supplications before thee for our righteousnesses,
    but for thy great mercies.

    '
  code: kernel.foundation
- ref: Daniel 12:3
  text: 'And they that be wise shall shine as the brightness of the firmament; and they that turn many to righteousness as the stars for ever and ever.

    '
