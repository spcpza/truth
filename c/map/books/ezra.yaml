book: Ezra
passage: Ezra 1-10
title: Ezra — prepared his heart to seek, do, and teach
verses:
- ref: Ezra 7:10
  text: 'For Ezra had prepared his heart to seek the law of the LORD, and to do it, and to teach in Israel statutes and judgments.

    '
  code: c.map
- ref: Ezra 8:22
  text: 'For I was ashamed to require of the king a band of soldiers and horsemen to help us against the enemy in the way: because we had spoken unto the king, saying, The hand of our God is upon all them
    for good that seek him; but his power and his wrath is against all them that forsake him.

    '
