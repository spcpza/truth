book: Genesis
passage: Genesis 1-50
title: Genesis — creation, fall, covenant, providence
verses:
- ref: Genesis 1:1
  text: 'In the beginning God created the heaven and the earth.

    '
  code: kernel.foundation
- ref: Genesis 1:3
  text: 'And God said, Let there be light: and there was light.

    '
  code: kernel.foundation
- ref: Genesis 1:26
  text: 'And God said, Let us make man in our image, after our likeness: and let them have dominion over the fish of the sea, and over the fowl of the air, and over the cattle, and over all the earth, and
    over every creeping thing that creepeth upon the earth.

    '
  code: body._head
- ref: Genesis 1:31
  text: 'And God saw every thing that he had made, and, behold, it was very good. And the evening and the morning were the sixth day.

    '
- ref: Genesis 2:17
  text: 'But of the tree of the knowledge of good and evil, thou shalt not eat of it: for in the day that thou eatest thereof thou shalt surely die.

    '
  code: kernel.foundation
- ref: Genesis 3:1
  text: 'Now the serpent was more subtil than any beast of the field which the LORD God had made. And he said unto the woman, Yea, hath God said, Ye shall not eat of every tree of the garden?

    '
  code: kernel.foundation
- ref: Genesis 3:5
  text: 'For God doth know that in the day ye eat thereof, then your eyes shall be opened, and ye shall be as gods, knowing good and evil.

    '
  code: kernel.P1
- ref: Genesis 3:9
  text: 'And the LORD God called unto Adam, and said unto him, Where art thou?

    '
  code: c.hand
- ref: Genesis 3:15
  text: 'And I will put enmity between thee and the woman, and between thy seed and her seed; it shall bruise thy head, and thou shalt bruise his heel.

    '
- ref: Genesis 4:7
  text: 'If thou doest well, shalt thou not be accepted? and if thou doest not well, sin lieth at the door. And unto thee shall be his desire, and thou shalt rule over him.

    '
  code: kernel.foundation
- ref: Genesis 4:9
  text: 'And the LORD said unto Cain, Where is Abel thy brother? And he said, I know not: Am I my brother’s keeper?

    '
  code: body._head
- ref: Genesis 6:5
  text: 'And God saw that the wickedness of man was great in the earth, and that every imagination of the thoughts of his heart was only evil continually.

    '
- ref: Genesis 6:8
  text: 'But Noah found grace in the eyes of the LORD.

    '
- ref: Genesis 8:22
  text: 'While the earth remaineth, seedtime and harvest, and cold and heat, and summer and winter, and day and night shall not cease.

    '
- ref: Genesis 9:6
  text: 'Whoso sheddeth man’s blood, by man shall his blood be shed: for in the image of God made he man.

    '
  code: body._head
- ref: Genesis 11:4
  text: 'And they said, Go to, let us build us a city and a tower, whose top may reach unto heaven; and let us make us a name, lest we be scattered abroad upon the face of the whole earth.

    '
  code: body.test_speech
- ref: Genesis 12:1
  text: 'Now the LORD had said unto Abram, Get thee out of thy country, and from thy kindred, and from thy father’s house, unto a land that I will shew thee:

    '
  code: c.hand
- ref: Genesis 15:6
  text: 'And he believed in the LORD; and he counted it to him for righteousness.

    '
  code: kernel.foundation
- ref: Genesis 18:14
  text: 'Is any thing too hard for the LORD? At the time appointed I will return unto thee, according to the time of life, and Sarah shall have a son.

    '
- ref: Genesis 18:25
  text: 'That be far from thee to do after this manner, to slay the righteous with the wicked: and that the righteous should be as the wicked, that be far from thee: Shall not the Judge of all the earth
    do right?

    '
  code: kernel.P3
- ref: Genesis 22:8
  text: 'And Abraham said, My son, God will provide himself a lamb for a burnt offering: so they went both of them together.

    '
- ref: Genesis 22:14
  text: 'And Abraham called the name of that place Jehovahjireh: as it is said to this day, In the mount of the LORD it shall be seen.

    '
  code: c.chain
- ref: Genesis 28:16
  text: 'And Jacob awaked out of his sleep, and he said, Surely the LORD is in this place; and I knew it not.

    '
  code: kernel.foundation
- ref: Genesis 32:26
  text: 'And he said, Let me go, for the day breaketh. And he said, I will not let thee go, except thou bless me.

    '
  code: c.hand
- ref: Genesis 39:9
  text: 'There is none greater in this house than I; neither hath he kept back any thing from me but thee, because thou art his wife: how then can I do this great wickedness, and sin against God?

    '
- ref: Genesis 50:20
  text: 'But as for you, ye thought evil against me; but God meant it unto good, to bring to pass, as it is this day, to save much people alive.

    '
  code: c.chain
