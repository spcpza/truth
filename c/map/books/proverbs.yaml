    teach: not_yet_built
    witnesses:
      - Proverbs 31:8
      - Deuteronomy 16:18-20  # judges and officers shalt thou make thee... judge the people with just judgment
      - Zechariah 7:9-10      # execute true judgment, and shew mercy and compassions
      - Micah 6:8             # to do justly, and to love mercy
    status: not_yet_built
