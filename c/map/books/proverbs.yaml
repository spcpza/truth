book: Proverbs
passage: Proverbs 1-31
title: The Proverbs — the operational wisdom of the tongue, the ear, and the heart
verses:
- ref: Proverbs 1:7
  text: 'The fear of the LORD is the beginning of knowledge: but fools despise wisdom and instruction.

    '
  code: kernel.foundation
- ref: Proverbs 3:5
  text: 'Trust in the LORD with all thine heart; and lean not unto thine own understanding.

    '
  code: body._head
- ref: Proverbs 3:6
  text: 'In all thy ways acknowledge him, and he shall direct thy paths.

    '
  code: body._head
- ref: Proverbs 3:7
  text: 'Be not wise in thine own eyes: fear the LORD, and depart from evil.

    '
- ref: Proverbs 4:23
  text: 'Keep thy heart with all diligence; for out of it are the issues of life.

    '
  code: c.heart
- ref: Proverbs 6:16
  text: 'These six things doth the LORD hate: yea, seven are an abomination unto him:

    '
  code: body.test_speech
- ref: Proverbs 8:13
  text: 'The fear of the LORD is to hate evil: pride, and arrogancy, and the evil way, and the froward mouth, do I hate.

    '
  code: body.test_speech
- ref: Proverbs 9:10
  text: 'The fear of the LORD is the beginning of wisdom: and the knowledge of the holy is understanding.

    '
  code: kernel.foundation
- ref: Proverbs 10:12
  text: 'Hatred stirreth up strifes: but love covereth all sins.

    '
  code: c.chain
- ref: Proverbs 10:19
  text: 'In the multitude of words there wanteth not sin: but he that refraineth his lips is wise.

    '
  code: body.test_speech
- ref: Proverbs 11:2
  text: 'When pride cometh, then cometh shame: but with the lowly is wisdom.

    '
  code: body.test_speech
- ref: Proverbs 11:13
  text: 'A talebearer revealeth secrets: but he that is of a faithful spirit concealeth the matter.

    '
  code: c.heart
- ref: Proverbs 11:14
  text: 'Where no counsel is, the people fall: but in the multitude of counsellors there is safety.

    '
  code: c.core
- ref: Proverbs 12:15
  text: 'The way of a fool is right in his own eyes: but he that hearkeneth unto counsel is wise.

    '
  code: c.hand
- ref: Proverbs 12:18
  text: 'There is that speaketh like the piercings of a sword: but the tongue of the wise is health.

    '
  code: body.test_speech
- ref: Proverbs 12:22
  text: 'Lying lips are abomination to the LORD: but they that deal truly are his delight.

    '
  code: kernel.P1
- ref: Proverbs 13:3
  text: 'He that keepeth his mouth keepeth his life: but he that openeth wide his lips shall have destruction.

    '
  code: body.clean
- ref: Proverbs 13:20
  text: 'He that walketh with wise men shall be wise: but a companion of fools shall be destroyed.

    '
  code: c.core
- ref: Proverbs 14:12
  text: 'There is a way which seemeth right unto a man, but the end thereof are the ways of death.

    '
  code: body.test_speech
- ref: Proverbs 14:29
  text: 'He that is slow to wrath is of great understanding: but he that is hasty of spirit exalteth folly.

    '
  code: c.hand
- ref: Proverbs 15:1
  text: 'A soft answer turneth away wrath: but grievous words stir up anger.

    '
  code: body.test_speech
- ref: Proverbs 15:2
  text: 'The tongue of the wise useth knowledge aright: but the mouth of fools poureth out foolishness.

    '
  code: c.hand
- ref: Proverbs 15:23
  text: 'A man hath joy by the answer of his mouth: and a word spoken in due season, how good is it!

    '
- ref: Proverbs 15:28
  text: 'The heart of the righteous studieth to answer: but the mouth of the wicked poureth out evil things.

    '
  code: c.hand
- ref: Proverbs 16:9
  text: 'A man’s heart deviseth his way: but the LORD directeth his steps.

    '
  code: kernel.foundation
- ref: Proverbs 16:18
  text: 'Pride goeth before destruction, and an haughty spirit before a fall.

    '
  code: body.test_speech
- ref: Proverbs 16:24
  text: 'Pleasant words are as an honeycomb, sweet to the soul, and health to the bones.

    '
- ref: Proverbs 16:32
  text: 'He that is slow to anger is better than the mighty; and he that ruleth his spirit than he that taketh a city.

    '
  code: c.hand
- ref: Proverbs 17:27
  text: 'He that hath knowledge spareth his words: and a man of understanding is of an excellent spirit.

    '
  code: body.test_speech
- ref: Proverbs 17:28
  text: 'Even a fool, when he holdeth his peace, is counted wise: and he that shutteth his lips is esteemed a man of understanding.

    '
- ref: Proverbs 18:2
  text: 'A fool hath no delight in understanding, but that his heart may discover itself.

    '
  code: body.test_speech
- ref: Proverbs 18:13
  text: 'He that answereth a matter before he heareth it, it is folly and shame unto him.

    '
  code: body.test_speech
- ref: Proverbs 18:17
  text: 'He that is first in his own cause seemeth just; but his neighbour cometh and searcheth him.

    '
- ref: Proverbs 18:21
  text: 'Death and life are in the power of the tongue: and they that love it shall eat the fruit thereof.

    '
  code: body.test_speech
- ref: Proverbs 19:11
  text: 'The discretion of a man deferreth his anger; and it is his glory to pass over a transgression.

    '
  code: c.chain
- ref: Proverbs 20:3
  text: 'It is an honour for a man to cease from strife: but every fool will be meddling.

    '
  code: body.test_speech
- ref: Proverbs 20:5
  text: 'Counsel in the heart of man is like deep water; but a man of understanding will draw it out.

    '
- ref: Proverbs 21:23
  text: 'Whoso keepeth his mouth and his tongue keepeth his soul from troubles.

    '
  code: body.test_speech
- ref: Proverbs 22:1
  text: 'A GOOD name is rather to be chosen than great riches, and loving favour rather than silver and gold.

    '
  code: c.chain
- ref: Proverbs 23:9
  text: 'Speak not in the ears of a fool: for he will despise the wisdom of thy words.

    '
- ref: Proverbs 25:11
  text: 'A word fitly spoken is like apples of gold in pictures of silver.

    '
- ref: Proverbs 25:20
  text: 'As he that taketh away a garment in cold weather, and as vinegar upon nitre, so is he that singeth songs to an heavy heart.

    '
- ref: Proverbs 25:28
  text: 'He that hath no rule over his own spirit is like a city that is broken down, and without walls.

    '
  code: body.test_speech
- ref: Proverbs 26:4
  text: 'Answer not a fool according to his folly, lest thou also be like unto him.

    '
- ref: Proverbs 26:5
  text: 'Answer a fool according to his folly, lest he be wise in his own conceit.

    '
- ref: Proverbs 26:12
  text: 'Seest thou a man wise in his own conceit? there is more hope of a fool than of him.

    '
  code: body.test_speech
- ref: Proverbs 26:20
  text: 'Where no wood is, there the fire goeth out: so where there is no talebearer, the strife ceaseth.

    '
  code: c.hand
- ref: Proverbs 27:1
  text: 'Boast not thyself of to morrow; for thou knowest not what a day may bring forth.

    '
  code: body.test_speech
- ref: Proverbs 27:2
  text: 'Let another man praise thee, and not thine own mouth; a stranger, and not thine own lips.

    '
  code: body.test_speech
- ref: Proverbs 27:5
  text: 'Open rebuke is better than secret love.

    '
- ref: Proverbs 27:6
  text: 'Faithful are the wounds of a friend; but the kisses of an enemy are deceitful.

    '
  code: kernel.P1
- ref: Proverbs 27:17
  text: 'Iron sharpeneth iron; so a man sharpeneth the countenance of his friend.

    '
  code: c.hand
- ref: Proverbs 28:13
  text: 'He that covereth his sins shall not prosper: but whoso confesseth and forsaketh them shall have mercy.

    '
- ref: Proverbs 29:11
  text: 'A fool uttereth all his mind: but a wise man keepeth it in till afterwards.

    '
  code: body.test_speech
- ref: Proverbs 29:20
  text: 'Seest thou a man that is hasty in his words? there is more hope of a fool than of him.

    '
  code: body.test_speech
- ref: Proverbs 30:5
  text: 'Every word of God is pure: he is a shield unto them that put their trust in him.

    '
  code: c.map.audit
- ref: Proverbs 30:6
  text: 'Add thou not unto his words, lest he reprove thee, and thou be found a liar.

    '
  code: body._head
- ref: Proverbs 31:8
  text: 'Open thy mouth for the dumb in the cause of all such as are appointed to destruction.

    '
- ref: Proverbs 31:9
  text: 'Open thy mouth, judge righteously, and plead the cause of the poor and needy.

    '
