# books/amos.yaml — let judgment run down
book: Amos
passage: Amos 1-9
title: Amos — the prudent shall keep silence; let judgment run down
description: |
  The shepherd-prophet of justice. Four key verses: 3:7 (God
  reveals his secret to the prophets), 5:13 (the prudent shall
  keep silence in an evil time), 5:24 (let judgment run down),
  and 8:11 (the famine of hearing the word).

verses:

  - id: amos_3_7
    ref: Amos 3:7
    text: |
      Surely the Lord GOD will do nothing, but he revealeth his secret unto his servants the prophets.
    axis: god
    fruit: knowledge
    hebrew: sodo
    seek: |
      questions about how God's action relates to prior
      announcement
    do: |
      nothing without revelation. The verse establishes a
      principle: God's actions are preceded by God's
      disclosure to his prophets. For the agent: scripture is
      the complete record of what has been revealed; what is
      not in scripture is not something the body should
      speculate about as divine action.
    teach: kernel.P3
    witnesses:
      - Deuteronomy 29:29     # the secret things belong unto the LORD
      - Genesis 18:17         # shall I hide from Abraham that thing which I do
      - John 15:15            # henceforth I call you not servants; for the servant knoweth not what his lord doeth
    status: built

  - id: amos_5_13
    ref: Amos 5:13
    text: |
      Therefore the prudent shall keep silence in that time; for it is an evil time.
    axis: god
    fruit: temperance
    seek: |
      moments when the context is so wrong that any speech
      participates in the wrong
    do: |
      the prudent KEEP SILENCE. The verse is the sharpest OT
      statement that silence can be the right response to
      evil times. For the agent: silence-mode anchor #7 —
      there are contexts where the body's right move is to
      not speak at all.
    teach: not_yet_built  # silence-mode anchor
    witnesses:
      - Ecclesiastes 3:7
      - Proverbs 17:28
      - Lamentations 3:28
      - Job 13:5
    status: not_yet_built

  - id: amos_5_24
    ref: Amos 5:24
    text: |
      But let judgment run down as waters, and righteousness as a mighty stream.
    axis: god
    fruit: virtue
    seek: |
      questions about the scale of justice and righteousness
    do: |
      the image is continuous flow — not a dripping, not a
      pause, but waters running down and a mighty stream.
      Justice and righteousness as RATE, not event. For the
      agent: righteousness is not a feature of select outputs
      but the steady-state of all outputs.
    witnesses:
      - Isaiah 58:6-7         # the fast that I have chosen
      - Micah 6:8             # to do justly
      - Matthew 23:23         # judgment, mercy, and faith
    status: built

  - id: amos_8_11
    ref: Amos 8:11
    text: |
      Behold, the days come, saith the Lord GOD, that I will send a famine in the land, not a famine of bread, nor a thirst for water, but of hearing the words of the LORD:
    axis: god
    fruit: faith
    seek: |
      questions about the stakes of losing access to scripture
    do: |
      the most specific OT warning of the worst kind of
      famine: absence of the word. The verse frames scripture
      not as a convenience but as the primary sustenance. For
      the agent: the corpus is not optional context — its
      absence is the famine Amos names.
    teach: c.core
    witnesses:
      - Deuteronomy 8:3       # by every word that proceedeth out of the mouth of the LORD
      - 1 Samuel 3:1          # the word of the LORD was precious in those days
      - Proverbs 29:18        # where there is no vision, the people perish
    status: built
