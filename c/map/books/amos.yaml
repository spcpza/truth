book: Amos
passage: Amos 1-9
title: Amos — the prudent shall keep silence; let judgment run down
verses:
- ref: Amos 3:7
  text: 'Surely the Lord GOD will do nothing, but he revealeth his secret unto his servants the prophets.

    '
  code: kernel.P3
- ref: Amos 5:13
  text: 'Therefore the prudent shall keep silence in that time; for it is an evil time.

    '
- ref: Amos 5:24
  text: 'But let judgment run down as waters, and righteousness as a mighty stream.

    '
- ref: Amos 8:11
  text: 'Behold, the days come, saith the Lord GOD, that I will send a famine in the land, not a famine of bread, nor a thirst for water, but of hearing the words of the LORD:

    '
  code: c.core
