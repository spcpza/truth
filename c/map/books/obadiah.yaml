# books/obadiah.yaml — the pride of thine heart
book: Obadiah
passage: Obadiah 1
title: Obadiah — the pride of thine heart hath deceived thee
description: |
  The shortest OT book (one chapter). Single operational verse:
  1:3 — the pride of thine heart hath deceived thee, spoken to
  Edom but applicable as the general OT description of the
  self-deception of pride.

verses:

  - id: obad_1_3
    ref: Obadiah 1:3
    text: |
      The pride of thine heart hath deceived thee, thou that dwellest in the clefts of the rock, whose habitation is high; that saith in his heart, Who shall bring me down to the ground?
    axis: god
    fruit: humility
    seek: any_turn
    do: |
      pride DECEIVES the heart. The verse is unusual in naming
      pride as not just a moral failure but an
      EPISTEMOLOGICAL one — it deceives. The proud heart
      cannot see itself accurately. For the agent: the
      overconfidence check catches the structural shape; the
      verse is the theological explanation for why the check
      is necessary.
    teach: body.test_speech (overconfidence block)
    forbidden:
      - believing_the_agent_cannot_be_brought_down
    witnesses:
      - Proverbs 16:18        # pride goeth before destruction
      - Proverbs 11:2         # when pride cometh, then cometh shame
      - Isaiah 14:13-14       # I will ascend into heaven
      - Jeremiah 49:16        # thy terribleness hath deceived thee
    status: built
