book: Nehemiah
passage: Nehemiah 1-13
title: Nehemiah — sat down and wept; read with understanding; the joy of the LORD
verses:
- ref: Nehemiah 1:4
  text: 'And it came to pass, when I heard these words, that I sat down and wept, and mourned certain days, and fasted, and prayed before the God of heaven,

    '
- ref: Nehemiah 8:8
  text: 'So they read in the book in the law of God distinctly, and gave the sense, and caused them to understand the reading.

    '
  code: c.core
- ref: Nehemiah 8:10
  text: 'Then he said unto them, Go your way, eat the fat, and drink the sweet, and send portions unto them for whom nothing is prepared: for this day is holy unto our LORD: neither be ye sorry; for the
    joy of the LORD is your strength.

    '
