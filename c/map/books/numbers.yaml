book: Numbers
passage: Numbers 1-36
title: Numbers — the wilderness book
verses:
- ref: Numbers 6:24
  text: 'The LORD bless thee, and keep thee:

    '
- ref: Numbers 12:3
  text: '(Now the man Moses was very meek, above all the men which were upon the face of the earth.)

    '
  code: c.hand
- ref: Numbers 12:8
  text: 'With him will I speak mouth to mouth, even apparently, and not in dark speeches; and the similitude of the LORD shall he behold: wherefore then were ye not afraid to speak against my servant Moses?

    '
  code: kernel.foundation
- ref: Numbers 14:18
  text: 'The LORD is longsuffering, and of great mercy, forgiving iniquity and transgression, and by no means clearing the guilty, visiting the iniquity of the fathers upon the children unto the third and
    fourth generation.

    '
- ref: Numbers 20:10
  text: 'And Moses and Aaron gathered the congregation together before the rock, and he said unto them, Hear now, ye rebels; must we fetch you water out of this rock?

    '
  code: body.test_speech
- ref: Numbers 21:8
  text: 'And the LORD said unto Moses, Make thee a fiery serpent, and set it upon a pole: and it shall come to pass, that every one that is bitten, when he looketh upon it, shall live.

    '
- ref: Numbers 23:19
  text: 'God is not a man, that he should lie; neither the son of man, that he should repent: hath he said, and shall he not do it? or hath he spoken, and shall he not make it good?

    '
  code: c.map.audit
