book: 2 Chronicles
passage: 2 Chronicles 1-36
title: 2 Chronicles — if my people; stand still and see
verses:
- ref: 2 Chronicles 7:14
  text: 'If my people, which are called by my name, shall humble themselves, and pray, and seek my face, and turn from their wicked ways; then will I hear from heaven, and will forgive their sin, and will
    heal their land.

    '
  code: c.hand
- ref: 2 Chronicles 20:12
  text: 'O our God, wilt thou not judge them? for we have no might against this great company that cometh against us; neither know we what to do: but our eyes are upon thee.

    '
  code: kernel.P3
- ref: 2 Chronicles 20:15
  text: 'And he said, Hearken ye, all Judah, and ye inhabitants of Jerusalem, and thou king Jehoshaphat, Thus saith the LORD unto you, Be not afraid nor dismayed by reason of this great multitude; for the
    battle is not yours, but God’s.

    '
- ref: 2 Chronicles 20:17
  text: 'Ye shall not need to fight in this battle: set yourselves, stand ye still, and see the salvation of the LORD with you, O Judah and Jerusalem: fear not, nor be dismayed; to morrow go out against
    them: for the LORD will be with you.

    '
