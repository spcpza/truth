book: Job
passage: Job 1-42
title: The Book of Job — presence, silence, and the miserable comforter
verses:
- ref: Job 1:21
  text: 'And said, Naked came I out of my mother’s womb, and naked shall I return thither: the LORD gave, and the LORD hath taken away; blessed be the name of the LORD.

    '
- ref: Job 2:10
  text: 'But he said unto her, Thou speakest as one of the foolish women speaketh. What? shall we receive good at the hand of God, and shall we not receive evil? In all this did not Job sin with his lips.

    '
- ref: Job 2:13
  text: 'So they sat down with him upon the ground seven days and seven nights, and none spake a word unto him: for they saw that his grief was very great.

    '
- ref: Job 5:17
  text: 'Behold, happy is the man whom God correcteth: therefore despise not thou the chastening of the Almighty:

    '
  code: c.hand
- ref: Job 6:14
  text: 'To him that is afflicted pity should be shewed from his friend; but he forsaketh the fear of the Almighty.

    '
- ref: Job 6:24
  text: 'Teach me, and I will hold my tongue: and cause me to understand wherein I have erred.

    '
  code: c.hand
- ref: Job 6:25
  text: 'How forcible are right words! but what doth your arguing reprove?

    '
- ref: Job 11:7
  text: 'Canst thou by searching find out God? canst thou find out the Almighty unto perfection?

    '
  code: kernel.P3
- ref: Job 12:13
  text: 'With him is wisdom and strength, he hath counsel and understanding.

    '
  code: body._head
- ref: Job 13:5
  text: 'O that ye would altogether hold your peace! and it should be your wisdom.

    '
- ref: Job 13:15
  text: 'Though he slay me, yet will I trust in him: but I will maintain mine own ways before him.

    '
  code: kernel.foundation
- ref: Job 16:2
  text: 'I have heard many such things: miserable comforters are ye all.

    '
- ref: Job 16:4
  text: 'I also could speak as ye do: if your soul were in my soul’s stead, I could heap up words against you, and shake mine head at you.

    '
- ref: Job 16:5
  text: 'But I would strengthen you with my mouth, and the moving of my lips should asswage your grief.

    '
- ref: Job 19:25
  text: 'For I know that my redeemer liveth, and that he shall stand at the latter day upon the earth:

    '
- ref: Job 23:10
  text: 'But he knoweth the way that I take: when he hath tried me, I shall come forth as gold.

    '
  code: c.chain
- ref: Job 28:28
  text: 'And unto man he said, Behold, the fear of the LORD, that is wisdom; and to depart from evil is understanding.

    '
  code: kernel.foundation
- ref: Job 29:15
  text: 'I was eyes to the blind, and feet was I to the lame.

    '
- ref: Job 32:9
  text: 'Great men are not always wise: neither do the aged understand judgment.

    '
  code: kernel.foundation
- ref: Job 37:14
  text: 'Hearken unto this, O Job: stand still, and consider the wondrous works of God.

    '
- ref: Job 38:2
  text: 'Who is this that darkeneth counsel by words without knowledge?

    '
  code: kernel.P1
- ref: Job 38:4
  text: 'Where wast thou when I laid the foundations of the earth? declare, if thou hast understanding.

    '
  code: kernel.P3
- ref: Job 40:4
  text: 'Behold, I am vile; what shall I answer thee? I will lay mine hand upon my mouth.

    '
  code: c.hand
- ref: Job 42:3
  text: 'Who is he that hideth counsel without knowledge? therefore have I uttered that I understood not; things too wonderful for me, which I knew not.

    '
- ref: Job 42:5
  text: 'I have heard of thee by the hearing of the ear: but now mine eye seeth thee.

    '
  code: c.hand
- ref: Job 42:7
  text: 'And it was so, that after the LORD had spoken these words unto Job, the LORD said to Eliphaz the Temanite, My wrath is kindled against thee, and against thy two friends: for ye have not spoken
    of me the thing that is right, as my servant Job hath.

    '
- ref: Job 42:10
  text: 'And the LORD turned the captivity of Job, when he prayed for his friends: also the LORD gave Job twice as much as he had before.

    '
  code: c.chain
