book: Deuteronomy
passage: Deuteronomy 1-34
title: Deuteronomy — second law, the Shema, the secret things
verses:
- ref: Deuteronomy 4:2
  text: 'Ye shall not add unto the word which I command you, neither shall ye diminish ought from it, that ye may keep the commandments of the LORD your God which I command you.

    '
  code: body._head
- ref: Deuteronomy 6:4
  text: 'Hear, O Israel: The LORD our God is one LORD:

    '
  code: kernel.foundation
- ref: Deuteronomy 6:5
  text: 'And thou shalt love the LORD thy God with all thine heart, and with all thy soul, and with all thy might.

    '
  code: kernel.foundation
- ref: Deuteronomy 6:6
  text: 'And these words, which I command thee this day, shall be in thine heart:

    '
  code: c.core
- ref: Deuteronomy 8:3
  text: 'And he humbled thee, and suffered thee to hunger, and fed thee with manna, which thou knewest not, neither did thy fathers know; that he might make thee know that man doth not live by bread only,
    but by every word that proceedeth out of the mouth of the LORD doth man live.

    '
  code: kernel.foundation
- ref: Deuteronomy 10:12
  text: 'And now, Israel, what doth the LORD thy God require of thee, but to fear the LORD thy God, to walk in all his ways, and to love him, and to serve the LORD thy God with all thy heart and with all
    thy soul,

    '
  code: kernel.foundation
- ref: Deuteronomy 29:29
  text: 'The secret things belong unto the LORD our God: but those things which are revealed belong unto us and to our children for ever, that we may do all the words of this law.

    '
  code: kernel.P3
- ref: Deuteronomy 30:14
  text: 'But the word is very nigh unto thee, in thy mouth, and in thy heart, that thou mayest do it.

    '
  code: c.core
- ref: Deuteronomy 30:19
  text: 'I call heaven and earth to record this day against you, that I have set before you life and death, blessing and cursing: therefore choose life, that both thou and thy seed may live:

    '
  code: c.hand
- ref: Deuteronomy 32:4
  text: 'He is the Rock, his work is perfect: for all his ways are judgment: a God of truth and without iniquity, just and right is he.

    '
  code: kernel.foundation
- ref: Deuteronomy 33:27
  text: 'The eternal God is thy refuge, and underneath are the everlasting arms: and he shall thrust out the enemy from before thee; and shall say, Destroy them.

    '
  code: kernel.foundation
