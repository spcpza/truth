book: 1 Samuel
passage: 1 Samuel 1-31
title: 1 Samuel — speak, LORD; obedience is better than sacrifice
verses:
- ref: 1 Samuel 2:2
  text: 'There is none holy as the LORD: for there is none beside thee: neither is there any rock like our God.

    '
  code: kernel.foundation
- ref: 1 Samuel 3:9
  text: 'Therefore Eli said unto Samuel, Go, lie down: and it shall be, if he call thee, that thou shalt say, Speak, LORD; for thy servant heareth. So Samuel went and lay down in his place.

    '
  code: body._ear
- ref: 1 Samuel 15:22
  text: 'And Samuel said, Hath the LORD as great delight in burnt offerings and sacrifices, as in obeying the voice of the LORD? Behold, to obey is better than sacrifice, and to hearken than the fat of
    rams.

    '
  code: body.test_speech
- ref: 1 Samuel 15:23
  text: 'For rebellion is as the sin of witchcraft, and stubbornness is as iniquity and idolatry. Because thou hast rejected the word of the LORD, he hath also rejected thee from being king.

    '
- ref: 1 Samuel 16:7
  text: 'But the LORD said unto Samuel, Look not on his countenance, or on the height of his stature; because I have refused him: for the LORD seeth not as man seeth; for man looketh on the outward appearance,
    but the LORD looketh on the heart.

    '
  code: body._head
- ref: 1 Samuel 17:47
  text: 'And all this assembly shall know that the LORD saveth not with sword and spear: for the battle is the LORD’s, and he will give you into our hands.

    '
