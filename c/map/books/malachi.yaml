book: Malachi
passage: Malachi 1-4
title: Malachi — I am the LORD, I change not; the Sun of righteousness
verses:
- ref: Malachi 3:6
  text: 'For I am the LORD, I change not; therefore ye sons of Jacob are not consumed.

    '
  code: kernel.foundation
- ref: Malachi 3:10
  text: 'Bring ye all the tithes into the storehouse, that there may be meat in mine house, and prove me now herewith, saith the LORD of hosts, if I will not open you the windows of heaven, and pour you
    out a blessing, that there shall not be room enough to receive it.

    '
- ref: Malachi 4:2
  text: 'But unto you that fear my name shall the Sun of righteousness arise with healing in his wings; and ye shall go forth, and grow up as calves of the stall.

    '
