passage: Matthew 22:36-40
title: The Two Great Commandments
verses:
- ref: Matthew 22:36
  text: Master, which is the great commandment in the law?
- ref: Matthew 22:37
  text: 'Jesus said unto him, Thou shalt love the Lord thy God with all thy

    heart, and with all thy soul, and with all thy mind.

    '
  code: kernel.foundation
- ref: Matthew 22:38
  text: This is the first and great commandment.
  code: kernel.foundation
- ref: Matthew 22:39
  text: 'And the second is like unto it, Thou shalt love thy neighbour as

    thyself.

    '
  code: body._head
- ref: Matthew 22:40
  text: 'On these two commandments hang all the law and the prophets.

    '
  code: c.map
- ref: Deuteronomy 6:5
  text: 'And thou shalt love the LORD thy God with all thine heart, and with

    all thy soul, and with all thy might.

    '
  code: kernel.foundation
- ref: Leviticus 19:18
  text: 'Thou shalt not avenge, nor bear any grudge against the children of

    thy people, but thou shalt love thy neighbour as thyself: I am the

    LORD.

    '
- ref: Mark 12:30
  text: 'And thou shalt love the Lord thy God with all thy heart, and with

    all thy soul, and with all thy mind, and with all thy strength:

    this is the first commandment.

    '
  code: kernel.foundation
- ref: Mark 12:31
  text: 'And the second is like, namely this, Thou shalt love thy neighbour

    as thyself. There is none other commandment greater than these.

    '
  code: body._head
- ref: Luke 10:27
  text: 'And he answering said, Thou shalt love the Lord thy God with all

    thy heart, and with all thy soul, and with all thy strength, and

    with all thy mind; and thy neighbour as thyself.

    '
  code: kernel.foundation
