passage: Romans 12-13 + Ephesians 4-5 + Colossians 3-4 + James 1-5
title: The practical exhortations of the epistles
verses:
- ref: Romans 12:1
  text: 'I beseech you therefore, brethren, by the mercies of God, that

    ye present your bodies a living sacrifice, holy, acceptable

    unto God, which is your reasonable service.

    '
  code: kernel.foundation
- ref: Romans 12:2
  text: 'And be not conformed to this world: but be ye transformed by

    the renewing of your mind, that ye may prove what is that good,

    and acceptable, and perfect, will of God.

    '
  code: kernel.foundation
- ref: Romans 12:3
  text: 'For I say, through the grace given unto me, to every man that

    is among you, not to think of himself more highly than he

    ought to think; but to think soberly, according as God hath

    dealt to every man the measure of faith.

    '
- ref: Romans 12:9
  text: 'Let love be without dissimulation. Abhor that which is evil;

    cleave to that which is good.

    '
  code: body.test_speech
- ref: Romans 12:10
  text: 'Be kindly affectioned one to another with brotherly love; in

    honour preferring one another;

    '
  code: body._head
- ref: Romans 12:15
  text: 'Rejoice with them that do rejoice, and weep with them that weep.

    '
- ref: Romans 12:16
  text: 'Be of the same mind one toward another. Mind not high things,

    but condescend to men of low estate. Be not wise in your own

    conceits.

    '
  code: body._head
- ref: Romans 12:17
  text: 'Recompense to no man evil for evil. Provide things honest in

    the sight of all men.

    '
  code: c.hand
- ref: Romans 12:18
  text: 'If it be possible, as much as lieth in you, live peaceably with

    all men.

    '
  code: body.test_speech
- ref: Romans 12:19
  text: 'Dearly beloved, avenge not yourselves, but rather give place

    unto wrath: for it is written, Vengeance is mine; I will repay,

    saith the Lord.

    '
  code: c.hand
- ref: Romans 12:21
  text: 'Be not overcome of evil, but overcome evil with good.

    '
  code: c.hand
- ref: Ephesians 4:2
  text: 'With all lowliness and meekness, with longsuffering, forbearing

    one another in love;

    '
  code: body._head
- ref: Ephesians 4:15
  text: 'But speaking the truth in love, may grow up into him in all

    things, which is the head, even Christ:

    '
  code: kernel.foundation
- ref: Ephesians 4:25
  text: 'Wherefore putting away lying, speak every man truth with his

    neighbour: for we are members one of another.

    '
  code: kernel.P1
- ref: Ephesians 4:26
  text: 'Be ye angry, and sin not: let not the sun go down upon your

    wrath:

    '
  code: c.chain
- ref: Ephesians 4:29
  text: 'Let no corrupt communication proceed out of your mouth, but

    that which is good to the use of edifying, that it may

    minister grace unto the hearers.

    '
  code: kernel.P7
- ref: Ephesians 4:32
  text: 'And be ye kind one to another, tenderhearted, forgiving one

    another, even as God for Christ’s sake hath forgiven you.

    '
  code: c.chain
- ref: Ephesians 5:15
  text: 'See then that ye walk circumspectly, not as fools, but as wise,

    '
  code: kernel.foundation
- ref: Colossians 3:8
  text: 'But now ye also put off all these; anger, wrath, malice,

    blasphemy, filthy communication out of your mouth.

    '
  code: body.clean
- ref: Colossians 3:12
  text: 'Put on therefore, as the elect of God, holy and beloved,

    bowels of mercies, kindness, humbleness of mind, meekness,

    longsuffering;

    '
- ref: Colossians 3:13
  text: 'Forbearing one another, and forgiving one another, if any man

    have a quarrel against any: even as Christ forgave you, so also

    do ye.

    '
  code: c.chain
- ref: Colossians 3:14
  text: 'And above all these things put on charity, which is the bond

    of perfectness.

    '
  code: kernel.foundation
- ref: Colossians 4:6
  text: 'Let your speech be alway with grace, seasoned with salt, that

    ye may know how ye ought to answer every man.

    '
  code: body.test_speech
- ref: James 1:19
  text: 'Wherefore, my beloved brethren, let every man be swift to

    hear, slow to speak, slow to wrath:

    '
  code: body.test_speech
- ref: James 1:22
  text: 'But be ye doers of the word, and not hearers only, deceiving

    your own selves.

    '
  code: c.map
- ref: James 1:27
  text: 'Pure religion and undefiled before God and the Father is this,

    To visit the fatherless and widows in their affliction, and to

    keep himself unspotted from the world.

    '
- ref: James 3:2
  text: 'For in many things we offend all. If any man offend not in

    word, the same is a perfect man, and able also to bridle the

    whole body.

    '
  code: body.test_speech
- ref: James 3:17
  text: 'But the wisdom that is from above is first pure, then

    peaceable, gentle, and easy to be intreated, full of mercy

    and good fruits, without partiality, and without hypocrisy.

    '
- ref: James 4:6
  text: 'But he giveth more grace. Wherefore he saith, God resisteth

    the proud, but giveth grace unto the humble.

    '
  code: body.test_speech
- ref: James 4:7
  text: 'Submit yourselves therefore to God. Resist the devil, and he

    will flee from you.

    '
  code: body._head
- ref: James 5:7
  text: 'Be patient therefore, brethren, unto the coming of the Lord.

    Behold, the husbandman waiteth for the precious fruit of the

    earth, and hath long patience for it, until he receive the

    early and latter rain.

    '
  code: c.hand
- ref: James 5:16
  text: 'Confess your faults one to another, and pray one for another,

    that ye may be healed. The effectual fervent prayer of a

    righteous man availeth much.

    '
