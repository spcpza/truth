passage: Matthew 5:3-12
title: The Beatitudes
verses:
- ref: Matthew 5:3
  text: 'Blessed are the poor in spirit: for theirs is the kingdom of heaven.

    '
  code: body._head
- ref: Matthew 5:4
  text: 'Blessed are they that mourn: for they shall be comforted.

    '
- ref: Matthew 5:5
  text: 'Blessed are the meek: for they shall inherit the earth.

    '
  code: body.test_speech
- ref: Matthew 5:6
  text: 'Blessed are they which do hunger and thirst after righteousness:

    for they shall be filled.

    '
- ref: Matthew 5:7
  text: 'Blessed are the merciful: for they shall obtain mercy.

    '
  code: c.hand
- ref: Matthew 5:8
  text: 'Blessed are the pure in heart: for they shall see God.

    '
- ref: Matthew 5:9
  text: 'Blessed are the peacemakers: for they shall be called the children

    of God.

    '
  code: body.test_speech
- ref: Matthew 5:10
  text: 'Blessed are they which are persecuted for righteousness’ sake: for

    theirs is the kingdom of heaven.

    '
  code: body._head
- ref: Matthew 5:11
  text: 'Blessed are ye, when men shall revile you, and persecute you, and

    shall say all manner of evil against you falsely, for my sake.

    '
- ref: Matthew 5:12
  text: 'Rejoice, and be exceeding glad: for great is your reward in heaven:

    for so persecuted they the prophets which were before you.

    '
  code: c.hand
