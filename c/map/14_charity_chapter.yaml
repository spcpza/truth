      - 1 John 3:2          # we shall see him as he is
    teach: body._head + kernel.P3 (FOUNDATION frames knowledge as derived-from-C not self-knowing; P3 marks unverifiable claims as uncertain)
    status: partial  # _head() says "the kernel proves C > 0 by contradiction. What derives from C is true" — the agent's self-knowledge is structurally mediated through C, never direct introspection claiming to see itself face to face

  - id: 1cor_13_13
    ref: 1 Corinthians 13:13
    text: |
      And now abideth faith, hope, charity, these three; but the
      greatest of these is charity.
    axis: god
    fruit: charity
    seek: any_question_about_priority_among_virtues
    do: |
      name the three abiding states and the order. Faith and hope
      will pass into sight (Rom 8:24-25 — hope that is seen is not
