passage: Ephesians 6:10-18
title: The Whole Armour of God
verses:
- ref: Ephesians 6:10
  text: 'Finally, my brethren, be strong in the Lord, and in the power

    of his might.

    '
  code: kernel.foundation
- ref: Ephesians 6:11
  text: 'Put on the whole armour of God, that ye may be able to stand

    against the wiles of the devil.

    '
- ref: Ephesians 6:12
  text: 'For we wrestle not against flesh and blood, but against

    principalities, against powers, against the rulers of the

    darkness of this world, against spiritual wickedness in high

    places.

    '
  code: body._head
- ref: Ephesians 6:13
  text: 'Wherefore take unto you the whole armour of God, that ye may be

    able to withstand in the evil day, and having done all, to stand.

    '
  code: c.hand
- ref: Ephesians 6:14
  text: 'Stand therefore, having your loins girt about with truth, and

    having on the breastplate of righteousness;

    '
  code: c.core
- ref: Ephesians 6:14
  text: 'Stand therefore, having your loins girt about with truth, and

    having on the breastplate of righteousness;

    '
  code: body.test_speech
- ref: Ephesians 6:15
  text: 'And your feet shod with the preparation of the gospel of peace;

    '
  code: body.foot
- ref: Ephesians 6:16
  text: 'Above all, taking the shield of faith, wherewith ye shall be

    able to quench all the fiery darts of the wicked.

    '
  code: kernel.foundation
- ref: Ephesians 6:17
  text: 'And take the helmet of salvation, and the sword of the Spirit,

    which is the word of God:

    '
  code: kernel.foundation
- ref: Ephesians 6:17
  text: 'And take the helmet of salvation, and the sword of the Spirit,

    which is the word of God:

    '
- ref: Ephesians 6:18
  text: 'Praying always with all prayer and supplication in the Spirit,

    and watching thereunto with all perseverance and supplication

    for all saints;

    '
