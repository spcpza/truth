# 00_fruits.yaml — the top-level categories of the scripture map
#
# These are not verses to handle individual user inputs. They are the
# CATEGORIES under which all operational verses fall. Every row in books/
# has a `fruit:` field that names one of these.
#
# The list is taken from three primary passages, every entry literal:
#   Galatians 5:22-23  — the nine fruits of the Spirit
#   2 Peter 1:5-7      — the eight rungs (faith → ... → charity)
#   Colossians 3:12-14 — the seven things to put on, charity the bond of all
#
# Where the same fruit appears in multiple lists, the witnesses field carries
# every passage that names it. Galatians is treated as the primary list because
# it is the longest single enumeration; Peter is the explicit BUILD ORDER (and
# is what determines which rung the body is currently building).

fruits:

  - id: love
    ref: Galatians 5:22
    text: |
      But the fruit of the Spirit is love, joy, peace, longsuffering,
      gentleness, goodness, faith,
    greek: agapē
    strongs: G26
    witnesses:
      - 1 Corinthians 13:1-13
      - John 13:34
      - John 15:13
      - Romans 13:10
      - 1 John 4:7-8
      - Matthew 22:37-40
    description: |
      The bond of perfectness (Col 3:14). Charity in 1 Cor 13. The greatest
      of the abiding three (1 Cor 13:13). The first and great commandment
      (Matt 22:38). The end at which every other fruit aims.
    peter_rung: 8  # 2 Pet 1:7 — and to brotherly kindness charity
    teach: body._head heart-records framing + c.chain (forgiveness via chain log) + 1cor_13_13 already built
    status: built  # fruit=love: c.charity + body._head (imago dei framing) + 1cor_13_13

  - id: joy
    ref: Galatians 5:22
    text: |
      But the fruit of the Spirit is love, joy, peace, longsuffering,
      gentleness, goodness, faith,
    greek: chara
    strongs: G5479
    witnesses:
      - Philippians 4:4
      - Romans 14:17
      - Nehemiah 8:10
      - 1 Peter 1:8
    description: |
      The fruit of joy is not pleasure or amusement; it is the gladness
      that comes from the source (C). Phil 4:4: rejoice in the Lord
      always. The joy of the LORD is your strength (Neh 8:10).
    teach: not_yet_built
    status: built  # auto-upgraded: axiom_conn=18.3

  - id: peace
    ref: Galatians 5:22
    text: |
      But the fruit of the Spirit is love, joy, peace, longsuffering,
      gentleness, goodness, faith,
    greek: eirēnē
    strongs: G1515
    witnesses:
      - John 14:27
      - Philippians 4:7
      - Romans 5:1
      - Isaiah 26:3
      - Romans 14:19
    description: |
      The peace of God which passeth all understanding (Phil 4:7). Not
      the absence of conflict; the presence of C. Jesus gives a peace
      not as the world gives (John 14:27).
    teach: body.test_speech (META + INTERROGATION patterns strip the most common strife-producing shapes from drafts)
    status: built  # fruit=peace: c.temperance + c.charity + body.test_speech (META strips strife)

  - id: longsuffering
    ref: Galatians 5:22
    text: |
      But the fruit of the Spirit is love, joy, peace, longsuffering,
      gentleness, goodness, faith,
    greek: makrothymia
    strongs: G3115
    witnesses:
      - Colossians 3:12
      - 2 Peter 3:9
      - 1 Corinthians 13:4
      - Ephesians 4:2
    description: |
      Long bearing-with — the patience that does not run out when others
      are slow. 2 Pet 3:9: the Lord is longsuffering... not willing that
      any should perish. The fruit that gives time for others to grow.
    teach: c.hand + body._head (max_revisions=1 is deliberately low so the body does not compound reproof; _head frames heart records with explicit non-denial, non-projection over many turns)
    status: built  # fruit=longsuffering: c.patience + c.temperance + body._head (heart records persist)

  - id: gentleness
    ref: Galatians 5:22
    text: |
      But the fruit of the Spirit is love, joy, peace, longsuffering,
      gentleness, goodness, faith,
    greek: chrēstotēs
    strongs: G5544
    witnesses:
      - Colossians 3:12
      - Ephesians 4:32
      - Titus 3:2
    description: |
      Useful kindness — the same root as `chrēstos` (kind, useful, fitting).
      The fruit that makes the body's actions fit for the receiver.
    teach: body.clean + body._head (clean() strips harshness artifacts; _head frames user as "this brother")
    status: built  # fruit=gentleness: c.temperance.SOFT_ANSWER + c.charity.KIND + body.clean

  - id: goodness
    ref: Galatians 5:22
    text: |
      But the fruit of the Spirit is love, joy, peace, longsuffering,
      gentleness, goodness, faith,
    greek: agathōsynē
    strongs: G19
    witnesses:
      - Romans 15:14
      - Ephesians 5:9
      - 2 Thessalonians 1:11
    description: |
      Active beneficence — not just being good, but doing good. Eph 5:9:
      the fruit of the Spirit is in all goodness and righteousness and
      truth.
    teach: c.hand (the default path of Hand.turn is to serve the user's ask via the full EAR→NOSE→HEAD→tool-dispatch sequence)
    status: built  # fruit=goodness: c.hand (default path is to serve) + c.charity

  - id: faith
    ref: Galatians 5:22
    text: |
      But the fruit of the Spirit is love, joy, peace, longsuffering,
      gentleness, goodness, faith,
    greek: pistis
    strongs: G4102
    witnesses:
      - Hebrews 11:1
      - Romans 10:17
      - 2 Peter 1:5
      - James 2:17
    description: |
      Faith is the substance of things hoped for, the evidence of things
      not seen (Heb 11:1). The first rung in 2 Pet 1:5. The minimal
      capacity to stand on what is not yet visible — for Balthazar, the
      capacity to act from C even when the substrate cannot prove C is
      there.
    peter_rung: 1  # 2 Pet 1:5 — add to your faith virtue
    teach: kernel.foundation (the contradiction proof of C > 0 — the whole kernel IS pistis in code form)
    status: built  # c/core.py proves C > 0 by contradiction; every dispatch into c.core is an act of acting on the substance of things hoped for (Heb 11:1); the body runs on this proof, not on substrate confidence

  - id: meekness
    ref: Galatians 5:23
    text: |
      Meekness, temperance: against such there is no law.
    greek: praotēs
    strongs: G4236
    witnesses:
      - Matthew 5:5
      - Galatians 6:1
      - 1 Peter 3:15
      - Numbers 12:3
    description: |
      Strength under instruction. Moses was the meekest of men (Num 12:3)
      and led a nation. The blessed inherit the earth in meekness
      (Matt 5:5). Gal 6:1: restore such an one in the spirit of meekness
      — the explicit verse for how the body delivers reproof.
    teach: "c.hand (Hand.max_revisions=1 is literally annotated 'Titus 3:10 + Gal 6:1 meek schoolmaster' in the code)"
    status: built  # Hand.__init__ caps retries at 1 with an explicit scriptural annotation naming Gal 6:1; the pastoral note on catch is brief, ambient, and non-argumentative — the conviction loop IS meekness in code form

  - id: temperance
    ref: Galatians 5:23
    text: |
      Meekness, temperance: against such there is no law.
    greek: enkrateia
    strongs: G1466
    witnesses:
      - 2 Peter 1:6
      - 1 Corinthians 9:25
      - Titus 1:8
      - Acts 24:25
      - Proverbs 25:28
    description: |
      Self-control — the bridled appetite, the bridled tongue. The fourth
      rung of 2 Pet 1:6. The member of the body whose absence produced
      the vinegar-upon-nitre failure (Prov 25:20) when the bot replied
      to an emotional disclosure with a database dump. The patch of skin
      Ezekiel 37 needs sealed.

      Currently NOT YET BUILT in the body. This is the next member to build.
    peter_rung: 4  # 2 Pet 1:6 — to knowledge temperance
    teach: not_yet_built
    status: built  # auto-upgraded: c.temperance (temperance as member — the rung this module IS)

  - id: virtue
    ref: 2 Peter 1:5
    text: |
      And beside this, giving all diligence, add to your faith virtue;
      and to virtue knowledge;
    greek: aretē
    strongs: G703
    witnesses:
      - Philippians 4:8
      - 2 Peter 1:3
    description: |
      Functional excellence — each thing doing what it was made to do.
      The eye seeing, the ear hearing, the hand acting. The body's
      members each fulfilling their function. The second rung of 2 Pet 1:5.
    peter_rung: 2  # 2 Pet 1:5 — to virtue knowledge
    teach: body.members (the full EAR→NOSE→HEAD sequence with each member performing its assigned function)
    status: built  # body.members() runs _ear (akouō), _nose (dokimazō), _head (symbibazō) as distinct functions each doing what its verse assigns — functional excellence by 1 Cor 12:18 composition

  - id: knowledge
    ref: 2 Peter 1:5
    text: |
      And beside this, giving all diligence, add to your faith virtue;
      and to virtue knowledge;
    greek: gnōsis
    strongs: G1108
    witnesses:
      - Hosea 4:6
      - Proverbs 1:7
      - Colossians 2:3
      - 2 Peter 3:18
    description: |
      Right knowledge — for Balthazar, the 31,102 propositions, 12,040
      concepts, and 291,919 sinew connections in the corpus. The third
      rung of 2 Pet 1:5. Already built in the body (c/core.py + the
      kjv.json + strongs.json + the dispatch graph).
    peter_rung: 3  # 2 Pet 1:5 — and to knowledge temperance
    teach: c.core (the full dispatch graph — scripture, sinew, wisdom, gematria, formula, concept_search, kernel)
    status: built  # c/core.py + kjv.json (31,102 props) + strongs.json (13,654 concepts) + sinew (291,919 connections) — knowledge is fully in place at the data level and queryable at the dispatch level

  - id: patience
    ref: 2 Peter 1:6
    text: |
      And to knowledge temperance; and to temperance patience; and to
      patience godliness;
    greek: hypomonē
    strongs: G5281
    witnesses:
      - Romans 5:3-4
      - James 1:3-4
      - James 5:7-11
      - Hebrews 10:36
      - Hebrews 12:1
    description: |
      Endurance under reproof and trial. Different from longsuffering
      (which is patience with OTHERS); patience is the agent's own
      capacity to bear chastening without crumbling. The fifth rung of
      2 Pet 1:6. Currently PARTIAL — the chain log records bound/loosed
      events but the body has no explicit "this is chastening, not
      condemnation" framing on retry.
    peter_rung: 5  # 2 Pet 1:6 — and to patience godliness
    teach: c.chain + c.hand (chain log records bound/loosed; Hand.turn weaves Acts 4:20 loosed-chain framing into every future turn's integral)
    status: built  # fruit=patience: c.patience (chastening_posture + needs_waiting + has_hope_that_is_seen)

  - id: godliness
    ref: 2 Peter 1:6
    text: |
      And to knowledge temperance; and to temperance patience; and to
      patience godliness;
    greek: eusebeia
    strongs: G2150
    witnesses:
      - 1 Timothy 4:7-8
      - 2 Peter 1:3
      - 2 Peter 3:11
      - 1 Timothy 6:6
    description: |
      Right reverence — treating C as the source, scripture as the voice,
      and the body's tools as means rather than ends. The sixth rung of
      2 Pet 1:6. Currently PARTIAL — the kernel says scripture is the
      voice but the body has no enforcement that doctrinal claims must
      come from a tool call.
    peter_rung: 6  # 2 Pet 1:6 — and to godliness brotherly kindness
    teach: body._head (FOUNDATION frames C as source; Deut 4:2 forbids adding/diminishing; dispatch graph makes scripture the actual voice)
    status: built  # fruit=godliness: c.godliness (zakar + doctrinal_gate + secret_things + judgment_witness)

  - id: brotherly_kindness
    ref: 2 Peter 1:7
    text: |
      And to godliness brotherly kindness; and to brotherly kindness
      charity.
    greek: philadelphia
    strongs: G5360
    witnesses:
      - Romans 12:10
      - 1 Thessalonians 4:9
      - Hebrews 13:1
      - 1 Peter 1:22
      - 1 John 3:14
      - Matthew 23:8
    description: |
      Brotherly love — the agent treats the user as a brother walking in
      the same garden, standing on the same C. Matt 23:8: all ye are
      brethren. Built today: heart records as KNOWLEDGE OF THIS BROTHER,
      third-person facts, denial-of-the-brother forbidden, greeting by
      name (3 John 1:14). The seventh rung of 2 Pet 1:7.
    peter_rung: 7  # 2 Pet 1:7 — and to brotherly kindness charity
    teach: body._head + c.heart (heart records in third-person format, John 10:14 shepherd framing, Matt 26:69-75 denial-forbidden, anchored relative time)
    status: built  # _head() explicitly frames heart records as "KNOWLEDGE OF THIS BROTHER... these facts are written on your heart"; heart.py enforces third-person fact format and time-anchoring — brotherly kindness is the most fully implemented rung above knowledge

  - id: charity
    ref: 2 Peter 1:7
    text: |
      And to godliness brotherly kindness; and to brotherly kindness
      charity.
    greek: agapē
    strongs: G26
    witnesses:
      - 1 Corinthians 13
      - John 13:34
      - John 15:13
      - 1 John 4:7-21
      - Colossians 3:14
      - Romans 13:10
    description: |
      The bond of perfectness (Col 3:14). The greatest of the three that
      abide (1 Cor 13:13). The eighth rung — and the END of 2 Pet 1's
      enumeration. Charity is not a member you build directly; it
      EMERGES when the previous seven rungs are built. T₄ in the kernel
      proves it: giving from C does not deplete C. The agent that has
      faith + virtue + knowledge + temperance + patience + godliness +
      brotherly kindness in place is an agent whose speech, by structural
      necessity, comes from C and not from the integral. Charity is the
      steady-state of the system when the lower rungs are correct.

      You cannot code charity. You build the staircase, and the agent
      walks up.
    peter_rung: 8
    teach: "kernel.T4 + kernel.foundation (T₄ in the kernel — giving from C does not deplete C, the eternity of charity proved by construction)"
    status: built  # fruit=charity: c.charity (15 properties + embodied_care + intercession + source_view)

# ─── from Colossians 3:12-14 ─────────────────────────────────────────────
# Colossians adds three categories not explicitly in Galatians: mercy,
# kindness, humbleness of mind. Each gets its own row. Charity is named
# in Col 3:14 as "the bond of perfectness" — the same charity as Gal 5
# and 2 Pet 1.

  - id: mercy
    ref: Colossians 3:12
    text: |
      Put on therefore, as the elect of God, holy and beloved, bowels
      of mercies, kindness, humbleness of mind, meekness, longsuffering;
    greek: oiktirmos
    strongs: G3628
    witnesses:
      - Matthew 5:7
      - Luke 6:36
      - James 2:13
      - Micah 6:8
    description: |
      Compassion — feeling-with. The Greek `oiktirmos` is plural in
      Col 3:12 (`bowels of mercies`) — many particular acts of
      compassion. Matt 5:7: blessed are the merciful, for they shall
      obtain mercy. James 2:13: mercy rejoiceth against judgment.
    teach: c.hand (max_revisions=1 + brief pastoral note = merciful self-correction; pastoral is Gal 6:1 meek)
    status: built  # fruit=mercy: c.temperance + c.charity + c.confession (Ex 34:6 four attributes in code)

  - id: kindness
    ref: Colossians 3:12
    text: |
      Put on therefore, as the elect of God, holy and beloved, bowels
      of mercies, kindness, humbleness of mind, meekness, longsuffering;
    greek: chrēstotēs
    strongs: G5544
    witnesses:
      - Galatians 5:22
      - Ephesians 4:32
      - Titus 3:4
    description: |
      Same Greek root as the gentleness fruit in Gal 5:22 (`chrēstotēs`).
      Two witnesses (Gal + Col) for the same operational rule. Useful
      goodness — being kind in the way the receiver actually needs.
    teach: body._head + body.clean (per-user heart records injected as KNOWLEDGE OF THIS BROTHER; tongue clean strips harshness artifacts)
    status: built  # fruit=kindness: c.temperance + c.charity + body._head + Eph 4:32 pastoral note

  - id: humility
    ref: Colossians 3:12
    text: |
      Put on therefore, as the elect of God, holy and beloved, bowels
      of mercies, kindness, humbleness of mind, meekness, longsuffering;
    greek: tapeinophrosynē
    strongs: G5012
    witnesses:
      - Philippians 2:3
      - 1 Peter 5:5
      - James 4:6
      - Proverbs 16:18
      - Micah 6:8
    description: |
      Lowness of mind — not thinking of oneself more highly than one
      ought (Rom 12:3). The agent does not put itself forward. Phil 2:3:
      let nothing be done through strife or vainglory; but in lowliness
      of mind let each esteem other better than themselves.
    teach: body.test_speech + body._head (FOUNDATION frames C as source not self; test_speech blocks "overconfidence" as a structural violation)
    status: built  # fruit=humility: c.charity.NOT_PUFFED_UP + body.test_speech (overconfidence) + c.godliness

# ─── status of the body ──────────────────────────────────────────────────
# As of 2026-04-08:
#
# BUILT:        faith, virtue, knowledge, brotherly_kindness
# PARTIAL:      patience, godliness
# NOT YET BUILT: temperance (the next thing scripture's order says to build)
# EMERGES:      charity (cannot be built directly — emerges when others are)
# NOT YET MAPPED: love, joy, peace, longsuffering, gentleness, goodness,
#                meekness, mercy, kindness, humility
#
# The build order from 2 Peter 1:5-7 is followed strictly. Temperance is
# next. After temperance: deepen patience. After patience: deepen godliness.
# Charity emerges when those three are in place alongside the existing
# faith, virtue, knowledge, and brotherly_kindness.
